<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnostic Séquence Dominante™ — ISD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#F5F0E8;font-family:'DM Sans',sans-serif;min-height:100vh}
:root{--gold:#C9A84C;--dark:#080810;--dark2:#0F0F1A;--border:#2A2A3A;--text:#F5F0E8;--muted:#8A8A9A;--red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#1A4A7A;--purple:#6C3483}
input,textarea,select{background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:6px;transition:all .2s}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
h1,h2,h3{font-family:'DM Serif Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:4px}
.gold-btn{background:var(--gold);color:var(--dark);padding:10px 20px;font-size:14px;font-weight:600;border-radius:6px;border:none}
.gold-btn:hover{opacity:.9;transform:translateY(-1px)}
.gold-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 20px;font-size:13px;border-radius:6px}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}
.danger-btn{background:#C0392B22;border:1px solid #C0392B55;color:var(--red);padding:8px 16px;font-size:12px;border-radius:6px}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:20px}
.field-wrap{margin-bottom:16px}
.hidden{display:none!important}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeInUp .3s ease}
.saving-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:260px;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:28px 32px 80px}
@media(max-width:768px){#app{flex-direction:column}#sidebar{width:100%;height:auto;position:relative}}

/* SIDEBAR */
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);background:#C9A84C08}
.client-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;margin:4px 8px;transition:all .2s;font-size:13px}
.client-pill:hover{background:#C9A84C15}
.client-pill.active{background:#C9A84C22;border:1px solid #C9A84C44}
.client-pill .name{font-weight:600;color:var(--text)}
.client-pill .meta{font-size:10px;color:var(--muted)}
.pilier-nav{padding:8px}
.pilier-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .2s;margin-bottom:2px}
.pilier-item:hover{background:var(--border);color:var(--text)}
.pilier-item.active{background:#C9A84C22;color:var(--gold);font-weight:600}
.pilier-item.done{color:var(--green)}
.pilier-item .score-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}

/* QUESTIONS */
.q-block{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;transition:border .2s}
.q-block:focus-within{border-color:#C9A84C44}
.q-num{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.5}
.q-help{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px;line-height:1.6;padding:6px 10px;background:#C9A84C08;border-left:2px solid #C9A84C44;border-radius:0 4px 4px 0}
.q-input{font-size:13px;resize:vertical;min-height:80px}
.section-header{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* SCORING */
.score-bar-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.score-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:16px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px #000c;animation:fadeInUp .3s ease}

/* RAPPORT */
.rapport-overlay{position:fixed;inset:0;background:#000e;z-index:400;display:flex;flex-direction:column;overflow:hidden}
.rapport-header{background:var(--dark2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rapport-body{flex:1;overflow-y:auto;padding:24px}
.rapport-section{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.rapport-section-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.edit-field{font-size:13px;resize:vertical;width:100%;background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px;line-height:1.7}

/* TOP BAR */
#topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;flex-shrink:0}
</style>
</head>
<body>

<div id="topbar">
  <span style="color:var(--gold);font-weight:700;font-family:'DM Serif Display',serif;font-size:17px">⬡ Diagnostic Séquence Dominante™</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="save-status" style="font-size:11px;color:var(--muted)">✓ Sauvegardé</span>
    <button onclick="showRapport()" id="rapport-btn" class="gold-btn hidden" style="padding:7px 16px;font-size:12px">📄 Générer Rapport</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">CLIENTS</div>
      <button onclick="showNewClientModal()" class="gold-btn" style="width:100%;padding:8px;font-size:12px">+ Nouveau client</button>
    </div>
    <div id="client-list" style="padding:8px;flex:1"></div>
    <div id="pilier-nav" class="hidden" style="border-top:1px solid var(--border)">
      <div style="padding:10px 12px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Navigation</div>
      <div class="pilier-nav" id="pilier-nav-items"></div>
    </div>
  </div>
  <div id="main">
    <div id="content"></div>
  </div>
</div>

<div id="new-client-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);background:#C9A84C08">
      <span style="font-weight:700;color:var(--gold)">Nouveau client</span>
    </div>
    <div style="padding:20px">
      <div class="field-wrap">
        <label>Prénom & Nom *</label>
        <input id="nc-nom" type="text" placeholder="Ex : Mohammed Benali"/>
      </div>
      <div class="field-wrap">
        <label>Entreprise / Activité</label>
        <input id="nc-entreprise" type="text" placeholder="Ex : Cabinet Conseil, Coaching…"/>
      </div>
      <div class="field-wrap">
        <label>Email</label>
        <input id="nc-email" type="email" placeholder="client@email.com"/>
      </div>
      <div class="field-wrap">
        <label>Objectif Sprint</label>
        <input id="nc-objectif" type="text" placeholder="Ex : 200 000 DHS/mois en 90 jours"/>
      </div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end">
      <button class="ghost-btn" onclick="hideNewClientModal()">Annuler</button>
      <button class="gold-btn" onclick="createClient()">Créer le dossier →</button>
    </div>
  </div>
</div>

<div id="rapport-overlay" class="rapport-overlay hidden"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL = "https://jkpbhxssymkkfxpgvnub.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcGJoeHNzeW1ra2Z4cGd2bnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTg0MjAsImV4cCI6MjA4ODY3NDQyMH0.hG-6wRPchKPZVYZB4RB_GjU5m1SXR7x5ykb5w-UveYM";
const API_ENDPOINT = "/.netlify/functions/claude";

// ═══════════════════════════════════════════════════
// STRUCTURE DES 7 PILIERS — 83 QUESTIONS
// ═══════════════════════════════════════════════════
const PILIERS = [
  {
    id:"P1", label:"Acquisition & Marché", color:"#C9A84C",
    sections:[
      {title:"A — MARCHÉ & TERRAIN DE JEU", questions:[
        {num:"1.1",text:"Quel est ton marché cible exact — et en quoi est-il suffisamment spécifique pour que tu sois perçu comme LE spécialiste ?",help:"Trop large = invisible. Trop étroit = petit. Cherche le 'micro-niche dominant'."},
        {num:"1.2",text:"Qui est ton client idéal (ICP) — décrit en 3 dimensions",help:"Démographique (qui il est), Psychographique (ce qu'il ressent/veut), Comportemental (ce qu'il fait)."},
        {num:"1.3",text:"Analyse du terrain de jeu — Taille, croissance, intensité concurrentielle",help:"Marché en croissance = vent dans le dos. Marché saturé = guerre des prix."},
        {num:"1.4",text:"Cartographie concurrentielle — Qui sont tes concurrents directs, et en quoi ton offre est objectivement différente (pas déclarativement) ?",help:"Différenciation prouvable ≠ différenciation déclarative. Liste 3 concurrents directs : nom / force / faiblesse / ce qu'ils ne font pas que toi tu fais."},
        {num:"1.5",text:"Barrières à l'entrée — Qu'est-ce qui rend ta position difficile à copier ou à attaquer ?",help:"IP, réseau, réputation, méthode propriétaire, accès exclusif… Ce qui se construit dans le temps."},
        {num:"1.6",text:"Pouvoir de prix — Combien de tes clients négocient le prix ? Que dit ça sur ton positionnement ?",help:"Jay Abraham : si >30% négocient, le problème est le positionnement, pas le prix."},
      ]},
      {title:"B — FORCE DU MESSAGE & AUTORITÉ", questions:[
        {num:"1.7",text:"Ton message marketing actuel — complète ces phrases exactement comme tu les communiques aujourd'hui",help:"J'aide [QUI] à [OBTENIR QUOI] en [COMBIEN DE TEMPS] grâce à [MÉTHODE/MÉCANISME]."},
        {num:"1.8",text:"Autorité & crédibilité perçue dans ton marché — ce que tu as aujourd'hui",help:"Résultats clients documentés, témoignages, publications, certifications, apparitions médias, communauté…"},
        {num:"1.9",text:"Prévisibilité du flux entrant — Ton flux de prospects est-il continu ou dépendant de lancements / événements ponctuels ?",help:"Continu = système. Lancement = fragile. Décris exactement comment les prospects arrivent chaque semaine."},
      ]},
      {title:"C — CANAUX, ASSETS DORMANTS & LEVIERS RAPIDES", questions:[
        {num:"1.10",text:"Canaux actifs — Coche et renseigne les volumes",help:"LinkedIn (connexions / posts / DMs), Email (taille liste / taux ouverture), Facebook, WhatsApp, CDD/réseau, Referral, Paid, Autre."},
        {num:"1.11",text:"Performance par canal actif",help:"Pour chaque canal actif : leads générés / mois, coût (temps ou argent), taux de conversion lead → RDV."},
        {num:"1.12",text:"Inventaire des assets dormants — Ce que tu possèdes déjà sans l'activer",help:"Anciens clients, liste email non contactée, connexions LinkedIn, partenaires potentiels, contenu non publié…"},
        {num:"1.13",text:"Prescripteurs naturels — Qui côtoie régulièrement ton ICP et pourrait envoyer des recommandations ?",help:"Ex : experts-comptables, avocats, banquiers, coaches complémentaires, associations CCI/CGEM, CDD..."},
        {num:"1.14",text:"Levier le plus rapide à activer dans les 7 prochains jours avec tes assets existants",help:"Pense : liste dormante, anciens clients, prescripteur non contacté, événement réseau imminent."},
      ]}
    ]
  },
  {
    id:"P2", label:"Offre & Conversion", color:"#2ECC71",
    sections:[
      {title:"A — PUISSANCE DE L'OFFRE (HORMOZI VALUE EQUATION)", questions:[
        {num:"2.1",text:"Dream Outcome — Résultat Rêvé : quel est le résultat final exact et mesurable que tu promets ?",help:"Spécifique + quantifié + délai = dominant. 'Je t'aide à mieux vendre' ≠ offre. '3 nouveaux clients/mois en 30J' = offre."},
        {num:"2.2",text:"Perceived Likelihood — Probabilité Perçue : qu'est-ce qui prouve que tu peux délivrer ce résultat ?",help:"Cas clients documentés (avant/après), témoignages vidéo, garantie, track record personnel, logique du mécanisme."},
        {num:"2.3",text:"Time to Success — Délai avant premier résultat visible (quick win)",help:"Plus le délai est court, plus la valeur perçue est haute. Si pas de quick win J7 — qu'est-ce qui serait crédible et délivrable en 7 jours ?"},
        {num:"2.4",text:"Effort & Sacrifice Client — Quelle est la charge réelle demandée au client pour obtenir le résultat ?",help:"Moins l'effort est grand, plus la valeur perçue est haute. Frictions = perte de valeur perçue. Où est le point d'abandon ?"},
        {num:"2.5",text:"Architecture Delivery — Comment délivres-tu actuellement ? Et quelle architecture serait optimale ?",help:"1:1, groupe, asynchrone, hybride. Qu'est-ce qui crée un goulot dans ta livraison ?"},
        {num:"2.6",text:"Bonus, garantie, rareté/urgence — As-tu des éléments qui augmentent la valeur perçue sans exploser les coûts ?",help:"Garantie satisfait ou remboursé, garantie résultat, bonus à forte valeur perçue, accès limité, deadline réelle."},
      ]},
      {title:"B — PROCESSUS DE VENTE & QUALIFICATION", questions:[
        {num:"2.7",text:"Cartographie du processus de vente complet — de la prise de contact au paiement",help:"Étape par étape : contact → qualification → RDV → présentation → objections → closing → paiement. Durée à chaque étape."},
        {num:"2.8",text:"Qualification — Quels sont tes critères explicites du BON client ? Et tes red flags ?",help:"Confondre qualification (fit) et persuasion (closing) = des mauvais clients dans le système."},
        {num:"2.9",text:"Scripts & outils de vente — ce qui existe aujourd'hui",help:"Script de closing, deck de présentation, email de suivi, proposition commerciale, CRM… Ce qui est formalisé vs improvisé."},
        {num:"2.10",text:"Les 4 objections les plus fréquentes — et la réponse actuelle à chacune",help:"Prix, timing, confiance, besoin. Pour chaque : la réponse que tu donnes actuellement."},
        {num:"2.11",text:"Prospects non convertis — Qu'est-ce qui se passe avec ceux qui disent NON ?",help:"Jay Abraham : 'Vos leads non convertis sont votre actif le plus sous-utilisé'. Ont-ils été reclassés ? Suivis ?"},
        {num:"2.12",text:"Métriques de conversion par étape",help:"Leads → RDV : X%. RDV → Présentation : X%. Présentation → Closing : X%. Closing → Paiement : X%."},
      ]},
      {title:"C — PRICING POWER & DÉFENSE DU PRIX", questions:[
        {num:"2.13",text:"Justification du prix — Ton prix est-il justifié par la VALEUR délivrée ou par le COÛT de ta prestation ?",help:"Prix = valeur perçue × probabilité = positionnement. Pas = nombre d'heures passées."},
        {num:"2.14",text:"Si tu augmentais tes prix de 30% demain, que se passerait-il réellement ?",help:"Exercice de stress test. La réponse révèle le niveau réel de value proposition."},
        {num:"2.15",text:"Remises et négociations — Pourquoi accordes-tu des remises ? Qu'est-ce que ça révèle ?",help:"Chaque remise accordée révèle soit un manque de confiance dans la valeur, soit un mauvais ciblage client."},
      ]}
    ]
  },
  {
    id:"P3", label:"Réseau & Recommandations", color:"#3498DB",
    sections:[
      {title:"A — CAPITAL RELATIONNEL & CARTOGRAPHIE", questions:[
        {num:"3.1",text:"Cartographie des relations stratégiques — Liste les profils qui ont accès à ton ICP",help:"Qui dans ton réseau peut t'introduire directement à ton client idéal ? Nomme des personnes précises, pas des catégories."},
        {num:"3.2",text:"Qualité de ton réseau actif — Combien de personnes dans ton réseau pourraient t'envoyer un prospect qualifié dans les 30 prochains jours si tu les appelais maintenant ?",help:"Compte uniquement les personnes qui te connaissent ET qui connaissent ton ICP."},
      ]},
      {title:"B — SYSTÈME DE RECOMMANDATION", questions:[
        {num:"3.3",text:"As-tu un mécanisme FORMEL pour générer des recommandations ? (pas informel — structuré)",help:"Script de demande, timing précis, incentive, suivi. Informel = 'ils recommandent s'ils veulent'. Formel = système."},
        {num:"3.4",text:"Si tu contactais tes 10 meilleurs clients cette semaine pour leur demander 1 recommandation chacun — combien en obtiendrais-tu, et pourquoi pas 10 ?",help:"Cette réponse révèle à la fois la satisfaction réelle de tes clients ET ta résistance à demander."},
      ]},
      {title:"C — PARTENARIATS STRATÉGIQUES & JOINT VENTURES", questions:[
        {num:"3.5",text:"Opportunités de Joint Ventures — Qui a déjà une audience de ton ICP et avec qui un accord gagnant-gagnant est possible rapidement ?",help:"Jay Abraham : JV = tu apportes de la valeur à leur audience, ils t'envoient des prospects. 0 coût d'acquisition."},
        {num:"3.6",text:"As-tu des accords de partenariat actifs aujourd'hui ? Si oui, décris-les. Si non, qu'est-ce qui a bloqué jusqu'ici ?",help:"Accord formel ou informel. Résultats obtenus. Ce qui n'a pas fonctionné et pourquoi."},
        {num:"3.7",text:"Distribution externe — Y a-t-il des communautés, associations, médias ou événements où ton ICP est concentré et où tu pourrais intervenir, publier ou être présenté ?",help:"CDD, CCI, associations sectorielles, podcasts, newsletters, conférences, groupes Facebook/LinkedIn."},
      ]},
      {title:"D — ROBUSTESSE RELATIONNELLE & RISQUES", questions:[
        {num:"3.8",text:"Risque de concentration — Ton réseau de recommandation dépend-il d'une seule source ou personne ?",help:"Si ta principale source de leads disparaît demain, que se passe-t-il ? Diversification = résilience."},
        {num:"3.9",text:"Long-term games (Naval) — Tes relations clés s'accumulent-elles dans le temps, ou sont-elles transactionnelles et éphémères ?",help:"Les jeux à long terme = réputation, confiance, réciprocité — tout se compose. Les jeux courts = zéro levier."},
      ]}
    ]
  },
  {
    id:"P4", label:"Économie & Monétisation", color:"#E67E22",
    sections:[
      {title:"A — THROUGHPUT ACCOUNTING (TOC — GOLDRATT)", questions:[
        {num:"4.1",text:"Throughput réel (T) — Calcul précis",help:"T = CA - Coûts Totalement Variables (CTV). Les CTV = uniquement ce qui disparaît si tu ne vends pas (commissions, matières directes). PAS les charges fixes."},
        {num:"4.2",text:"Operating Expense (OE) — Toutes les charges fixes mensuelles (qui existent que tu vendes ou non)",help:"Loyer, salaires fixes, outils SaaS, assurances, amortissements… Tout ce qui tourne même si tu vends 0."},
      ]},
      {title:"B — LES 3 LEVIERS ABRAHAM (CLIENTS × VALEUR × FRÉQUENCE)", questions:[
        {num:"4.3",text:"Levier 1 — Clients actifs : qui sont-ils, combien, et quel est le segment le plus rentable ?",help:"Nombre, profil, CA moyen, marge, LTV estimée. Quel segment représente 80% de ta valeur ?"},
        {num:"4.4",text:"Levier 2 — Valeur de transaction : as-tu des offres d'upsell et de montée en gamme structurées ?",help:"Échelle d'offres : entrée → core → premium → VIP. Taux de conversion entre chaque niveau."},
        {num:"4.5",text:"Levier 3 — Fréquence : à quelle fréquence rachète un client, et comment pourrait-on l'augmenter ?",help:"Abonnement, retainer, contenu récurrent, programme d'accompagnement continu. Mécanismes de fidélisation."},
        {num:"4.6",text:"Réactivation — Combien d'anciens clients pourraient racheter si tu les contactais cette semaine ?",help:"Actif le plus rapide à monétiser : 0 coût d'acquisition, confiance déjà établie. Combien ? Avec quelle offre ?"},
      ]},
      {title:"C — RÉTENTION & EXPANSION", questions:[
        {num:"4.7",text:"Taux de rétention et causes de départ — Pourquoi les clients partent-ils ?",help:"Fin de contrat naturelle, déception du résultat, meilleure offre ailleurs, plus besoin. Chaque raison a une solution différente."},
        {num:"4.8",text:"Activation — À quel moment le client obtient-il sa première valeur concrète et visible ?",help:"Goldratt + Hormozi : le client qui atteint un premier résultat reste. Celui qui n'atteint pas de résultat visible part."},
        {num:"4.9",text:"Expansion — Mécanismes qui font progresser le client dans l'échelle d'offres",help:"Comment un client passe de l'offre entrée à l'offre premium ? Y a-t-il un mécanisme automatique ou c'est aléatoire ?"},
        {num:"4.10",text:"Boucle de recommandation — Tes clients satisfaits t'envoient-ils spontanément des contacts ?",help:"Abraham : le client qui génère des recommandations = la preuve que la valeur est réelle ET perçue."},
      ]},
      {title:"D — STRUCTURE D'OFFRES & LADDER", questions:[
        {num:"4.11",text:"Cartographie de ton échelle d'offres complète — ce qui existe et ce qui manque",help:"Prix, format, durée, marge, volume vendu par mois. LTV par chemin client. Qu'est-ce qui manque pour maximiser la LTV ?"},
      ]}
    ]
  },
  {

// SUPABASE
// ═══════════════════════════════════════════════════
async function sbFetch(path, opts={}) {
  try {
    const res = await fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": opts.prefer || "",
        ...(opts.headers||{})
      }
    });
    if (!res.ok) {
      const err = await res.text();
      console.error("Supabase HTTP", res.status, err);
      return null;
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  } catch(e) { 
    console.error("Supabase fetch error:", e.message);
    return null; 
  }
}

async function loadClients() {
  try {
    // Charger les clients DSD existants
    const dsd = await sbFetch("/rest/v1/dsd_clients?select=*&order=created_at.desc");
    const dsdClients = Array.isArray(dsd) ? dsd : [];

    // Charger aussi les clients de l'App 1 (Diagnostic Clarté Rentable) pas encore dans DSD
    const app1 = await sbFetch("/rest/v1/diagnostics?select=id,prenom,nom,email,entreprise,score_global,stoppeur,created_at&order=created_at.desc&limit=50");
    const app1Clients = Array.isArray(app1) ? app1 : [];

    // Fusionner — les clients DSD en premier, puis les App1 non encore dans DSD
    const dsdIds = new Set(dsdClients.map(c => c.id));
    const dsdEmails = new Set(dsdClients.map(c => c.email).filter(Boolean));

    const app1Converted = app1Clients
      .filter(c => c.email && !dsdEmails.has(c.email) && !dsdIds.has(c.id))
      .map(c => ({
        id: c.id,
        nom: `${c.prenom||''} ${c.nom||''}`.trim() || c.email,
        entreprise: c.entreprise || '',
        email: c.email || '',
        objectif: '',
        responses: {},
        scores: {},
        from_app1: true,
        app1_stoppeur: c.stoppeur,
        app1_score: c.score_global,
        created_at: c.created_at
      }));

    STATE.clients = [...dsdClients, ...app1Converted];
    renderClientList();
  } catch(e) {
    console.error("loadClients:", e);
    STATE.clients = [];
    renderClientList();
  }
}

async function saveClient(client) {
  await sbFetch("/rest/v1/dsd_clients", {
    method: "POST",
    headers: {"Prefer": "resolution=merge-duplicates"},
    body: JSON.stringify(client)
  });
}

async function saveResponses(clientId) {
  const resp = STATE.responses[clientId] || {};
  const scores = STATE.scores[clientId] || {};
  await sbFetch("/rest/v1/dsd_clients?id=eq." + clientId, {
    method: "PATCH",
    body: JSON.stringify({
      responses: resp,
      scores: scores,
      updated_at: new Date().toISOString()
    })
  });
}

async function loadClientData(clientId) {
  const data = await sbFetch("/rest/v1/dsd_clients?id=eq." + clientId + "&select=*");
  if (data && data[0]) {
    STATE.responses[clientId] = data[0].responses || {};
    STATE.scores[clientId] = data[0].scores || {};
  }
}

function showNewClientModal() {
  document.getElementById('new-client-modal').classList.remove('hidden');
  document.getElementById('nc-nom').focus();
}

function hideNewClientModal() {
  document.getElementById('new-client-modal').classList.add('hidden');
  ['nc-nom','nc-entreprise','nc-email','nc-objectif'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function createClient() {
  const nom = document.getElementById('nc-nom').value.trim();
  if (!nom) { alert('Le nom est requis.'); return; }
  
  const client = {
    id: 'dsd_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    nom,
    entreprise: document.getElementById('nc-entreprise').value.trim(),
    email: document.getElementById('nc-email').value.trim(),
    objectif: document.getElementById('nc-objectif').value.trim(),
    responses: {},
    scores: {},
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };
  
  await saveClient(client);
  STATE.clients.unshift(client);
  STATE.responses[client.id] = {};
  STATE.scores[client.id] = {};
  hideNewClientModal();
  renderClientList();
  selectClient(client.id);
}

async function selectClient(clientId) {
  STATE.currentClientId = clientId;
  STATE.currentPilier = 'P1';
  
  const client = STATE.clients.find(c => c.id === clientId);
  
  // Si client App1 pas encore dans dsd_clients, le créer
  if (client && client.from_app1) {
    const newClient = {
      id: clientId,
      nom: client.nom,
      entreprise: client.entreprise || '',
      email: client.email || '',
      objectif: '',
      responses: {},
      scores: {},
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    await saveClient(newClient);
    client.from_app1 = false;
    STATE.responses[clientId] = {};
    STATE.scores[clientId] = {};
  } else if (!STATE.responses[clientId]) {
    await loadClientData(clientId);
  }
  
  renderClientList();
  renderPilierNav();
  renderPilier('P1');
  document.getElementById('pilier-nav').classList.remove('hidden');
  document.getElementById('rapport-btn').classList.remove('hidden');
}

function renderClientList() {
  const container = document.getElementById('client-list');
  if (!STATE.clients.length) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:12px;text-align:center">Aucun client<br>Créez le premier dossier</p>';
    return;
  }
  container.innerHTML = STATE.clients.map(c => `
    <div class="client-pill ${c.id === STATE.currentClientId ? 'active' : ''}" onclick="selectClient('${c.id}')">
      <div style="flex:1;min-width:0">
        <div class="name">${c.nom}</div>
        <div class="meta">${c.entreprise || c.email || '—'}</div>
        ${c.from_app1 ? `<div style="font-size:9px;color:var(--orange);margin-top:2px">↳ Depuis Diagnostic CR™ · Score ${c.app1_score||'—'}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function renderPilierNav() {
  const clientId = STATE.currentClientId;
  const scores = STATE.scores[clientId] || {};
  
  const nav = document.getElementById('pilier-nav-items');
  nav.innerHTML = PILIERS.map(p => {
    const score = scores[p.id];
    const hasScore = score !== undefined && score !== null;
    const isDone = hasScore;
    const sc = hasScore ? score.toFixed(1) : '';
    const color = hasScore ? (score < 4 ? 'var(--red)' : score < 7 ? 'var(--orange)' : 'var(--green)') : 'var(--muted)';
    
    return `
      <div class="pilier-item ${p.id === STATE.currentPilier ? 'active' : ''} ${isDone ? 'done' : ''}" onclick="switchPilier('${p.id}')">
        <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
        <span style="flex:1;font-size:12px">${p.label}</span>
        ${hasScore ? `<span class="score-badge" style="background:${color}22;color:${color}">${sc}</span>` : ''}
      </div>
    `;
  }).join('');
}

function switchPilier(pilierID) {
  STATE.currentPilier = pilierID;
  renderPilierNav();
  renderPilier(pilierID);
  document.getElementById('main').scrollTo({top:0,behavior:'smooth'});
}

function renderPilier(pilierID) {

          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Pilier ${pilierID} · ${client ? client.nom : ''}</div>
          <h2 style="color:${pilier.color};font-size:1.5rem;margin-bottom:4px">${pilier.label}</h2>

        </div>

            <div style="text-align:center;padding:8px 16px;background:${(scores[pilierID]<4?'#C0392B':scores[pilierID]<7?'#E67E22':'#27AE60')}22;border-radius:8px;border:1px solid ${(scores[pilierID]<4?'#C0392B':scores[pilierID]<7?'#E67E22':'#27AE60')}44">
              <div style="font-size:22px;font-weight:700;color:${scores[pilierID]<4?'var(--red)':scores[pilierID]<7?'var(--orange)':'var(--green)'}">${scores[pilierID].toFixed(1)}</div>
              <div style="font-size:10px;color:var(--muted)">Score</div>
            </div>` : ''}
        </div>
      </div>`;
  
  // Sections et questions
  pilier.sections.forEach(section => {
    html += `<div class="section-header">${section.title}</div>`;
    section.questions.forEach(q => {
      const val = responses[q.num] || '';
      html += `
        <div class="q-block" id="q-${q.num}">
          <div class="q-num">${q.num}</div>
          <div class="q-text">${q.text}</div>
          ${q.help ? `<div class="q-help">${q.help}</div>` : ''}
          <textarea class="q-input" placeholder="Réponse…" oninput="updateResponse('${q.num}', this.value)">${escHtml(val)}</textarea>
        </div>`;
    });
  });
  
  // Scoring section
  html += `
    <div style="background:var(--dark2);border:1px solid #C9A84C33;border-radius:12px;padding:20px;margin-top:24px">
      <div style="font-size:12px;color:var(--gold);font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">📊 SCORING ${pilierID}</div>
      <div style="margin-bottom:12px">
        <label style="font-size:13px;margin-bottom:8px;display:block">Score ${pilier.label} (0 à 10)</label>
        <div style="display:flex;align-items:center;gap:14px">
          <input type="range" min="0" max="10" step="0.5" value="${scores[pilierID] || 5}" 
            style="flex:1;accent-color:${pilier.color}" 
            oninput="updateScore('${pilierID}', parseFloat(this.value)); document.getElementById('score-val-${pilierID}').textContent=parseFloat(this.value).toFixed(1)"/>
          <span id="score-val-${pilierID}" style="font-size:18px;font-weight:700;color:${pilier.color};min-width:36px">${(scores[pilierID]||5).toFixed(1)}</span>

        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px">
          <span>0 — Critique</span><span>5 — Moyen</span><span>10 — Excellent</span>
        </div>
      </div>
      <div class="field-wrap">
        <label>Commentaire sur ce pilier (optionnel)</label>
        <textarea class="q-input" rows="2" placeholder="Observations, points clés à retenir pour le rapport…" oninput="updateResponse('score_comment_${pilierID}', this.value)">${escHtml(responses['score_comment_' + pilierID] || '')}</textarea>
      </div>

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
// RÉPONSES & SCORES
// ═══════════════════════════════════════════════════
function updateResponse(qNum, value) {
  const clientId = STATE.currentClientId;
  if (!clientId) return;
  if (!STATE.responses[clientId]) STATE.responses[clientId] = {};
  STATE.responses[clientId][qNum] = value;
  autoSave();
}

function updateScore(pilierID, value) {
  const clientId = STATE.currentClientId;
  if (!clientId) return;
  if (!STATE.scores[clientId]) STATE.scores[clientId] = {};
  STATE.scores[clientId][pilierID] = value;
  renderPilierNav();
  autoSave();
}

function autoSave() {
  clearTimeout(STATE.saveTimer);
  const ss = document.getElementById('save-status');

async function genererRapportIA() {
  const clientId = STATE.currentClientId;
  const client = STATE.clients.find(c => c.id === clientId);
  const responses = STATE.responses[clientId] || {};
  const scores = STATE.scores[clientId] || {};
  
  const body = document.getElementById('rapport-body');
  body.innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted)"><div style="width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px"></div><p>Analyse de ${Object.keys(responses).length} réponses en cours…</p></div>`;
  
  // Construire le résumé des réponses
  let resumeResponses = '';
  PILIERS.forEach(p => {
    resumeResponses += `\n\n=== ${p.id} — ${p.label} (Score: ${scores[p.id] || 'non scoré'}/10) ===`;
    p.sections.forEach(s => {
      s.questions.forEach(q => {
        const val = responses[q.num];
        if (val && val.trim()) {
          resumeResponses += `\n${q.num} — ${q.text.substring(0,60)}...\nRéponse: ${val.substring(0,300)}`;
        }
      });
    });
  });
  
  const scoresSummary = PILIERS.map(p => `${p.id} ${p.label}: ${scores[p.id] ? scores[p.id].toFixed(1) : '—'}/10`).join(' | ');
  const globalScore = Object.values(scores).length > 0 ? (Object.values(scores).reduce((a,b)=>a+b,0)/Object.values(scores).length).toFixed(1) : '—';
  const stoppeurPilier = Object.entries(scores).length > 0 ? Object.entries(scores).sort((a,b)=>a[1]-b[1])[0] : null;
  
  const prompt = `Tu es Saifeddine El Gharbaoui — Architecte de Clarté Rentable™. Tu viens de conduire le Diagnostic de Séquence Dominante™ avec ${client.nom} (${client.entreprise || ''}). Objectif Sprint : ${client.objectif || 'non défini'}.

SCORES ISD™ : ${scoresSummary}
Score Global : ${globalScore}/10
Stoppeur Dominant : ${stoppeurPilier ? stoppeurPilier[0] + ' (' + stoppeurPilier[1].toFixed(1) + '/10)' : '—'}

RÉPONSES COMPLÈTES DU DIAGNOSTIC :${resumeResponses}

Génère le rapport JSON suivant UNIQUEMENT, sans markdown, sans texte avant ou après :

{
  "lecture_froide": "Section 0 — Lecture froide du profil fondateur. 4-5 paragraphes. Sous-sections : Ce qu'il EST (actifs réels), Ce que le contexte impose (contraintes réelles). Ton direct, sans complaisance, basé uniquement sur les réponses. Commence par : Avant de parler de stratégie, parlons de réalité.",
  "scores_interpretation": "Section 1 — Interprétation des scores 7 piliers. Pour chaque pilier : score + 1-2 phrases d'interprétation directe. Identifie clairement le pilier minimum.",
  "calculs_economiques": "Section 2 — Calculs économiques réels. Basés sur les chiffres P4 et P6. Économie unitaire par offre, Break-even, LTV, Runway. Tous les chiffres en DHS.",
  "stoppeur_profond": "Section 3 — Le vrai stoppeur. Boucle causale en 3-4 couches (signal → pattern → flux → frein). Commence par : L'Audit de Clarté Rentable avait raison sur le symptôme. Le Diagnostic de Séquence Dominante identifie maintenant la cause profonde.",
  "classement_contraintes": "Section 4 — Classement des 3 principales contraintes. Pour chacune : nom, levier ISD™, impact estimé, pourquoi cet ordre.",
  "plan_sprint": "Section 5 — Plan Sprint 30 jours. 4 semaines. Pour chaque semaine : Contrainte attaquée, Priorité unique, Actions concrètes (3-5), Livrables de fin de semaine, KPI de la semaine.",
  "kpis": "Section 6 — Tableau de bord KPIs. Indicateurs quotidiens (leading) et hebdomadaires (lagging). Situation actuelle vs Cible 30J vs Cible 90J.",
  "risques": "Section 7 — Risques & points de défaillance. Top 5 risques avec mitigation pour chacun.",
  "levier_psychologique": "Section 8 — Levier psychologique. Ce que le diagnostic révèle vraiment sur le fondateur. Basé sur P7. Direct, bienveillant, percutant. 3-4 paragraphes.",
  "concurrence": "Section — Analyse Concurrentielle. Basée sur Q1.3 et Q1.4. Cartographie 3 concurrents directs : nom/force/faiblesse/différenciation. Angle non exploité. Recommandation de positionnement.",
  "action_48h": "Section 9 — Action immédiate dans les 48h. UNE seule action. La plus asymétrique. Définition de done précise. Règle d'or : si tu analyses encore le message, tu as déjà perdu.",
  "options_suite": "Section 10 — Options de suite. 3 options : plan seul / Sprint 30J / Sprint 90J. Prix, ce que chaque option implique, pour qui c'est adapté."
}

RÈGLES : Tutoiement. Chiffres en DHS. Basé uniquement sur les réponses fournies — pas d'invention. Ton direct, analytique, bienveillant. Ne jamais mentionner Hormozi, Goldratt, Jay Abraham, Naval par leur nom.`;

  try {
    const resp = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:4000, messages:[{role:"user",content:prompt}]})
    });
    const json = await resp.json();
    let txt = json.content?.[0]?.text || "{}";
    txt = txt.replace(/```json|```/g,"").trim();
    let r = {};
    try { r = JSON.parse(txt); } catch(e) { r = {lecture_froide: "Erreur de génération. Relancer."}; }
    
    renderRapportEditable(r, client, scores, globalScore, stoppeurPilier);
  } catch(e) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--red)">Erreur : ${e.message}</div>`;
  }
}
