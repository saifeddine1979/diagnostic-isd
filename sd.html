<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnostic Séquence Dominante™ — ISD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#F5F0E8;font-family:'DM Sans',sans-serif;min-height:100vh}
:root{--gold:#C9A84C;--dark:#080810;--dark2:#0F0F1A;--border:#2A2A3A;--text:#F5F0E8;--muted:#8A8A9A;--red:#C0392B;--green:#27AE60;--orange:#E67E22}
input,textarea,select{background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:6px;transition:all .2s}
h1,h2,h3{font-family:'DM Serif Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:4px}
.gold-btn{background:var(--gold);color:var(--dark);padding:9px 18px;font-size:13px;font-weight:600;border-radius:6px;border:none}
.gold-btn:hover{opacity:.9}
.ghost-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 16px;font-size:13px;border-radius:6px}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}
.hidden{display:none!important}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeInUp .3s ease}
.saving-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}

/* LAYOUT */
#topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-shrink:0}
#app{display:flex;height:calc(100vh - 48px);overflow:hidden}
#sidebar{width:250px;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:24px 28px 80px}

/* SIDEBAR */
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);background:#C9A84C08}
.client-pill{padding:9px 12px;border-radius:7px;cursor:pointer;margin:3px 7px;transition:all .2s;font-size:12px;border:1px solid transparent}
.client-pill:hover{background:#C9A84C15;border-color:#C9A84C33}
.client-pill.active{background:#C9A84C22;border-color:#C9A84C55}
.client-pill .cname{font-weight:600;color:var(--text);font-size:13px}
.client-pill .cmeta{font-size:10px;color:var(--muted);margin-top:2px}
.pilier-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .2s;margin:2px 6px}
.pilier-item:hover{background:var(--border);color:var(--text)}
.pilier-item.active{background:#C9A84C22;color:var(--gold);font-weight:600}
.pilier-item .sbadge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.nav-sep{height:1px;background:var(--border);margin:8px 0}

/* QUESTION BLOCKS */
.q-block{background:var(--dark2);border:1px solid var(--border);border-radius:9px;padding:16px;margin-bottom:14px;transition:border .2s}
.q-block:focus-within{border-color:#C9A84C44}
.q-num{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.q-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:6px}
.q-help{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px;line-height:1.6;padding:6px 10px;background:#C9A84C08;border-left:2px solid #C9A84C44;border-radius:0 4px 4px 0}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* TABLEAUX DE SAISIE */
.input-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
.input-table th{background:#1A1A2A;color:var(--gold);padding:7px 10px;text-align:left;font-weight:600;font-size:11px;border:1px solid var(--border)}
.input-table td{padding:4px 6px;border:1px solid var(--border);vertical-align:middle}
.input-table td input,.input-table td select{font-size:12px;padding:5px 8px;background:#0F0F1A}
.input-table td textarea{font-size:12px;padding:5px 8px;background:#0F0F1A;resize:vertical;min-height:40px}
.input-table tr:nth-child(even) td{background:#0D0D18}

/* CASES À COCHER */
.check-grid{display:grid;gap:6px;margin-top:8px}
.check-grid-2{grid-template-columns:1fr 1fr}
.check-grid-3{grid-template-columns:1fr 1fr 1fr}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--dark);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;font-size:12px;color:var(--text);line-height:1.5}
.check-item:hover{border-color:#C9A84C44;background:#C9A84C08}
.check-item.checked{border-color:#C9A84C88;background:#C9A84C12;color:var(--gold)}
.check-item input[type=checkbox]{flex-shrink:0;width:14px;height:14px;accent-color:var(--gold);margin-top:1px}
.check-item label{cursor:pointer;flex:1}

/* CHAMPS SIMPLES */
.field-row{display:grid;gap:10px;margin-top:8px}
.field-row-2{grid-template-columns:1fr 1fr}
.field-row-3{grid-template-columns:1fr 1fr 1fr}
.field-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field-unit{display:flex;flex-direction:column;gap:4px}
.field-unit label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* SCORING */
.scoring-block{background:#C9A84C08;border:1px solid #C9A84C33;border-radius:10px;padding:18px;margin-top:20px}
.scoring-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.scoring-table th{background:#1A1A2A;color:var(--gold);padding:7px 10px;text-align:left;font-size:11px;border:1px solid #C9A84C22}
.scoring-table td{padding:8px 10px;border:1px solid #2A2A3A;vertical-align:middle}
.scoring-table tr:nth-child(even) td{background:#0D0D18}
.scoring-table .barème{font-size:11px;color:var(--muted);font-style:italic}
.scoring-table input[type=number]{width:60px;text-align:center}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:480px;overflow:hidden;animation:fadeInUp .25s ease}

/* RAPPORT OVERLAY */
.rapport-ov{position:fixed;inset:0;background:#000f;z-index:400;display:flex;flex-direction:column;overflow:hidden}
.rapport-hdr{background:var(--dark2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.rapport-body{flex:1;overflow-y:auto;padding:24px}
.r-section{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
.r-sec-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.r-edit{font-size:13px;resize:vertical;width:100%;background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px;line-height:1.7}
</style>
</head>
<body>

<div id="topbar">
  <span style="color:var(--gold);font-weight:700;font-family:'DM Serif Display',serif;font-size:16px">⬡ Diagnostic Séquence Dominante™</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="save-status" style="font-size:11px;color:var(--muted)"></span>
    <button id="rapport-btn" class="gold-btn hidden" onclick="showRapport()" style="padding:6px 14px;font-size:12px">📄 Générer Rapport</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">DOSSIERS CLIENTS</div>
      <button class="gold-btn" onclick="showNewClientModal()" style="width:100%;padding:7px;font-size:12px">+ Nouveau client</button>
    </div>
    <div id="client-list" style="padding:6px;flex:1"></div>
    <div id="pilier-nav" class="hidden" style="border-top:1px solid var(--border);padding:8px">
      <div style="padding:6px 4px 4px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">PILIERS</div>
      <div id="pilier-nav-items"></div>
    </div>
  </div>
  <div id="main"><div id="content"></div></div>
</div>

<!-- MODAL NOUVEAU CLIENT -->
<div id="modal-nc" class="modal-ov hidden">
  <div class="modal-box">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);background:#C9A84C08"><span style="font-weight:700;color:var(--gold)">Nouveau dossier client</span></div>
    <div style="padding:18px">
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">Nom complet *</label><input id="nc-nom" placeholder="Ex : Mohammed Benali"/></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">Entreprise / Activité</label><input id="nc-ent" placeholder="Ex : Cabinet Conseil, Coaching…"/></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">Email</label><input id="nc-email" type="email" placeholder="client@email.com"/></div>
      <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">Objectif Sprint 30J</label><input id="nc-obj" placeholder="Ex : 200 000 DHS/mois en 90 jours"/></div>
    </div>
    <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
      <button class="ghost-btn" onclick="hideModal('modal-nc')">Annuler</button>
      <button class="gold-btn" onclick="createClient()">Créer →</button>
    </div>
  </div>
</div>

<!-- RAPPORT OVERLAY -->
<div id="rapport-ov" class="rapport-ov hidden"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SB_URL = "https://jkpbhxssymkkfxpgvnub.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcGJoeHNzeW1ra2Z4cGd2bnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTg0MjAsImV4cCI6MjA4ODY3NDQyMH0.hG-6wRPchKPZVYZB4RB_GjU5m1SXR7x5ykb5w-UveYM";
const API = "/.netlify/functions/claude";

// ═══════════════════════════════════════════
// HELPERS UI
// ═══════════════════════════════════════════
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hideModal(id){document.getElementById(id).classList.add('hidden')}
function showModal(id){document.getElementById(id).classList.remove('hidden')}
function setSaveStatus(msg,color='var(--muted)'){const el=document.getElementById('save-status');if(el){el.textContent=msg;el.style.color=color}}

// ═══════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════
async function sb(path,opts={}){
  try{
    const r=await fetch(SB_URL+path,{...opts,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":opts.prefer||"",...(opts.headers||{})}});
    const t=await r.text();
    return t?JSON.parse(t):null;
  }catch(e){console.error('SB:',e.message);return null;}
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S={clients:[],curId:null,curP:'P1',R:{},scores:{},timer:null};

function R(){return S.R[S.curId]||{}}
function setR(key,val){if(!S.R[S.curId])S.R[S.curId]={};S.R[S.curId][key]=val;autoSave()}
function getScore(p){return(S.scores[S.curId]||{})[p]}
function setScore(p,v){if(!S.scores[S.curId])S.scores[S.curId]={};S.scores[S.curId][p]=v;renderPilierNav();autoSave()}

function autoSave(){
  clearTimeout(S.timer);
  setSaveStatus('• Modification…','var(--orange)');
  S.timer=setTimeout(async()=>{
    await sb('/rest/v1/dsd_clients?id=eq.'+S.curId,{method:'PATCH',body:JSON.stringify({responses:S.R[S.curId]||{},scores:S.scores[S.curId]||{},updated_at:new Date().toISOString()})});
    setSaveStatus('✓ Sauvegardé','var(--green)');
  },1800);
}

// ═══════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════
async function loadClients(){
  try{
    const dsd=await sb('/rest/v1/dsd_clients?select=*&order=created_at.desc');
    const dsdList=Array.isArray(dsd)?dsd:[];
    const app1=await sb('/rest/v1/diagnostics?select=id,prenom,nom,email,entreprise,score_global,stoppeur,created_at&source=neq.eclair&order=created_at.desc&limit=50');
    const app1List=Array.isArray(app1)?app1:[];
    const dsdEmails=new Set(dsdList.map(c=>c.email).filter(Boolean));
    const dsdIds=new Set(dsdList.map(c=>c.id));
    const converted=app1List.filter(c=>c.email&&!dsdEmails.has(c.email)&&!dsdIds.has(c.id)).map(c=>({
      id:c.id,nom:(c.prenom+' '+(c.nom||'')).trim()||c.email,entreprise:c.entreprise||'',
      email:c.email||'',objectif:'',responses:{},scores:{},from_app1:true,
      app1_stoppeur:c.stoppeur,app1_score:c.score_global,created_at:c.created_at
    }));
    S.clients=[...dsdList,...converted];
  }catch(e){S.clients=[];}
  renderClientList();
}

function renderClientList(){
  const el=document.getElementById('client-list');
  if(!S.clients.length){el.innerHTML='<p style="font-size:11px;color:var(--muted);padding:12px;text-align:center">Aucun dossier</p>';return;}
  el.innerHTML=S.clients.map(c=>`
    <div class="client-pill ${c.id===S.curId?'active':''}" onclick="selectClient('${c.id}')">
      <div class="cname">${h(c.nom)}</div>
      <div class="cmeta">${h(c.entreprise||c.email||'—')}</div>
      ${c.from_app1?`<div style="font-size:9px;color:var(--orange);margin-top:2px">↳ CR™ · Score ${c.app1_score||'—'}</div>`:''}
    </div>`).join('');
}

async function selectClient(id){
  S.curId=id;S.curP='P1';
  const c=S.clients.find(x=>x.id===id);
  if(c&&c.from_app1){
    const nc={id,nom:c.nom,entreprise:c.entreprise||'',email:c.email||'',objectif:'',responses:{},scores:{},created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
    await sb('/rest/v1/dsd_clients',{method:'POST',prefer:'resolution=merge-duplicates',body:JSON.stringify(nc)});
    c.from_app1=false;S.R[id]={};S.scores[id]={};
  }else if(!S.R[id]){
    const d=await sb('/rest/v1/dsd_clients?id=eq.'+id+'&select=responses,scores');
    if(d&&d[0]){S.R[id]=d[0].responses||{};S.scores[id]=d[0].scores||{};}
    else{S.R[id]={};S.scores[id]={};}
  }
  renderClientList();renderPilierNav();renderPilier(S.curP);
  document.getElementById('pilier-nav').classList.remove('hidden');
  document.getElementById('rapport-btn').classList.remove('hidden');
}

function showNewClientModal(){document.getElementById('nc-nom').value='';document.getElementById('nc-ent').value='';document.getElementById('nc-email').value='';document.getElementById('nc-obj').value='';showModal('modal-nc');setTimeout(()=>document.getElementById('nc-nom').focus(),100)}

async function createClient(){
  const nom=document.getElementById('nc-nom').value.trim();
  if(!nom){alert('Nom requis');return;}
  const c={id:'dsd_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),nom,entreprise:document.getElementById('nc-ent').value.trim(),email:document.getElementById('nc-email').value.trim(),objectif:document.getElementById('nc-obj').value.trim(),responses:{},scores:{},created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  await sb('/rest/v1/dsd_clients',{method:'POST',body:JSON.stringify(c)});
  S.clients.unshift(c);S.R[c.id]={};S.scores[c.id]={};
  hideModal('modal-nc');renderClientList();selectClient(c.id);
}

// ═══════════════════════════════════════════
// PILIER NAV
// ═══════════════════════════════════════════
const PILIERS_META=[
  {id:'P1',label:'Acquisition & Marché',color:'#C9A84C'},
  {id:'P2',label:'Offre & Conversion',color:'#2ECC71'},
  {id:'P3',label:'Réseau & Recommandations',color:'#3498DB'},
  {id:'P4',label:'Économie & Monétisation',color:'#E67E22'},
  {id:'P5',label:'Capacité & Goulot',color:'#9B59B6'},
  {id:'P6',label:'Finances & Robustesse',color:'#E74C3C'},
  {id:'P7',label:'Fondateur & Leviers',color:'#1ABC9C'},
];

function renderPilierNav(){
  const nav=document.getElementById('pilier-nav-items');
  nav.innerHTML=PILIERS_META.map(p=>{
    const sc=getScore(p.id);
    const hasS=sc!==undefined&&sc!==null;
    const col=hasS?(sc<4?'var(--red)':sc<7?'var(--orange)':'var(--green)'):'var(--muted)';
    return `<div class="pilier-item ${p.id===S.curP?'active':''}" onclick="switchPilier('${p.id}')">
      <span style="width:7px;height:7px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
      <span style="flex:1;font-size:11px">${p.id} ${p.label.split(' ')[0]}</span>
      ${hasS?`<span class="sbadge" style="background:${col}22;color:${col}">${sc.toFixed(1)}</span>`:''}
    </div>`;
  }).join('');
}

function switchPilier(p){S.curP=p;renderPilierNav();renderPilier(p);document.getElementById('main').scrollTo({top:0,behavior:'smooth'})}

// ═══════════════════════════════════════════
// COMPOSANTS DE SAISIE
// ═══════════════════════════════════════════
function makeTextarea(key,placeholder='',rows=3){
  const ta=document.createElement('textarea');
  ta.rows=rows;ta.placeholder=placeholder;ta.style.cssText='font-size:13px;resize:vertical;margin-top:8px';
  ta.value=R()[key]||'';
  ta.oninput=()=>setR(key,ta.value);
  return ta;
}

function makeInput(key,placeholder='',type='text'){
  const inp=document.createElement('input');
  inp.type=type;inp.placeholder=placeholder;
  inp.value=R()[key]||'';
  inp.oninput=()=>setR(key,inp.value);
  return inp;
}

// Tableau multi-colonnes
function makeTable(key,headers,rows=3){
  const wrap=document.createElement('div');wrap.style.overflowX='auto';
  const t=document.createElement('table');t.className='input-table';
  const thead=document.createElement('thead');
  const trh=document.createElement('tr');
  headers.forEach(h=>{const th=document.createElement('th');th.textContent=h;trh.appendChild(th)});
  thead.appendChild(trh);t.appendChild(thead);
  const tbody=document.createElement('tbody');
  const saved=(R()[key])||[];
  for(let r=0;r<rows;r++){
    const tr=document.createElement('tr');
    headers.forEach((_,ci)=>{
      const td=document.createElement('td');
      const inp=document.createElement('input');
      inp.value=(saved[r]&&saved[r][ci])||'';
      inp.oninput=()=>{
        const cur=R()[key]||Array.from({length:rows},()=>Array(headers.length).fill(''));
        if(!cur[r])cur[r]=Array(headers.length).fill('');
        cur[r][ci]=inp.value;setR(key,cur);
      };
      td.appendChild(inp);tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  t.appendChild(tbody);wrap.appendChild(t);return wrap;
}

// Cases à cocher
function makeCheckboxes(key,items,cols=2){
  const wrap=document.createElement('div');
  wrap.className=`check-grid check-grid-${cols}`;
  const saved=R()[key]||[];
  items.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='check-item'+(saved.includes(i)?' checked':'');
    const cb=document.createElement('input');cb.type='checkbox';cb.id=key+'_'+i;cb.checked=saved.includes(i);
    const lbl=document.createElement('label');lbl.htmlFor=key+'_'+i;lbl.textContent=item;
    cb.onchange=()=>{
      const cur=R()[key]||[];
      const idx=cur.indexOf(i);
      if(cb.checked&&idx===-1)cur.push(i);
      else if(!cb.checked&&idx!==-1)cur.splice(idx,1);
      div.className='check-item'+(cb.checked?' checked':'');
      setR(key,cur);
    };
    div.appendChild(cb);div.appendChild(lbl);wrap.appendChild(div);
  });
  return wrap;
}

// Ligne de champs métriques
function makeFieldRow(fields,cols=3){
  const wrap=document.createElement('div');
  wrap.className=`field-row field-row-${cols}`;
  wrap.style.marginTop='8px';
  fields.forEach(([key,label,placeholder])=>{
    const unit=document.createElement('div');unit.className='field-unit';
    const lbl=document.createElement('label');lbl.textContent=label;

function makeScoringBlock(pilierID,criteria){
  const p=PILIERS_META.find(x=>x.id===pilierID);
  const wrap=document.createElement('div');wrap.className='scoring-block';
  wrap.innerHTML=`<div style="font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">📊 SCORING ${pilierID}</div>`;
  
  // Tableau critères
  const t=document.createElement('table');t.className='scoring-table';
  t.innerHTML=`<thead><tr><th>Critère</th><th style="width:200px">Barème</th><th style="width:80px">Score</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  const saved=R()['scoring_'+pilierID]||{};
  criteria.forEach((cr,i)=>{
    const tr=document.createElement('tr');
    const key='sc_'+pilierID+'_'+i;
    tr.innerHTML=`<td>${cr.label}</td><td class="barème">${cr.bareme}</td>`;
    const td=document.createElement('td');
    const inp=document.createElement('input');inp.type='number';inp.min=0;inp.max=cr.max||4;inp.step=0.5;inp.style.cssText='width:60px;text-align:center';
    inp.value=saved[i]||'';
    inp.oninput=()=>{
      const cur=R()['scoring_'+pilierID]||{};
      cur[i]=parseFloat(inp.value)||0;
      setR('scoring_'+pilierID,cur);
      // Recalculer score total
      const total=Object.values(R()['scoring_'+pilierID]||{}).reduce((a,b)=>a+b,0);
      const maxTotal=criteria.reduce((a,c)=>a+(c.max||4),0);
      const score10=Math.round((total/maxTotal)*100)/10;
      setScore(pilierID,score10);
      scoreDisplay.textContent=score10.toFixed(1)+'/10';
    };
    td.appendChild(inp);tr.appendChild(td);tbody.appendChild(tr);
  });
  t.appendChild(tbody);wrap.appendChild(t);
  
  // Affichage score total
  const sc=getScore(pilierID);
  const scoreDisplay=document.createElement('div');
  scoreDisplay.style.cssText='font-size:24px;font-weight:700;text-align:center;padding:10px';
  const col=sc?(sc<4?'var(--red)':sc<7?'var(--orange)':'var(--green)'):'var(--gold)';
  scoreDisplay.style.color=col;
  scoreDisplay.textContent=(sc?sc.toFixed(1)+'/10':'—');
  wrap.appendChild(scoreDisplay);
  
  // Commentaire
  const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:var(--muted);margin-bottom:4px';lbl.textContent='Commentaire libre sur ce pilier';
  const ta=makeTextarea('comment_'+pilierID,'Observations, points clés, intuitions…',2);
  wrap.appendChild(lbl);wrap.appendChild(ta);
  return wrap;
}

function renderPilier(pid){
  const c=document.getElementById('content');c.innerHTML='';

  hdr.innerHTML=`
    <div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${pid} · ${client?h(client.nom):''}</div>

    </div>

  wrap.appendChild(hdr);

  // Contenu par pilier
  if(pid==='P1')buildP1(wrap);

  else if(pid==='P3')buildP3(wrap);
  else if(pid==='P4')buildP4(wrap);
  else if(pid==='P5')buildP5(wrap);
  else if(pid==='P6')buildP6(wrap);
  else if(pid==='P7')buildP7(wrap);

  // Navigation
  const idx=PILIERS_META.findIndex(x=>x.id===pid);
  const prev=idx>0?PILIERS_META[idx-1]:null;
  const next=idx<PILIERS_META.length-1?PILIERS_META[idx+1]:null;
  const nav=document.createElement('div');
  nav.style.cssText='display:flex;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);gap:10px';

  wrap.appendChild(nav);

function calcArchetype(responses){
  const r=responses;
  // Q1 Mode de vente
  const q1=r['icp_q1']||'';
  const modeCode=q1.includes('commerçants')||q1.includes('Commerce')?'COMMERCE':q1.includes('particuliers')||q1.includes('B2C')?'B2C':q1.includes('B2B Structuré')||q1.includes('PME')||q1.includes('entreprises structurées')?'B2B_STRUCT':'B2B_SOLO';
  // Q2 Stade (CA)
  const q2=r['icp_q2']||'';
  const stadeCode=q2.includes('0 à 15')||q2.includes('démarr')?'DEMARRAGE':q2.includes('15 000 à 50')||q2.includes('décollage')?'DECOLLAGE':q2.includes('50 000 à 150')||q2.includes('plateau')?'PLATEAU':'SCALING';
  // Q4 Stoppeur
  const q4=r['icp_q4']||'';
  const stopCode=q4.includes('prospect')||q4.includes('visibilité')?'LEADS':q4.includes('conver')||q4.includes('signer')?'CONVERSION':q4.includes('fréquence')||q4.includes('rachètent')?'FREQUENCE':q4.includes('débordé')||q4.includes('capacité')?'CAPACITE':q4.includes('marge')||q4.includes('prix')?'MARGE':'LEADS';

  // Calcul archétype
  let profil=1;
  if(modeCode==='COMMERCE')profil=9;
  else if(modeCode==='B2C'&&stadeCode==='DEMARRAGE')profil=1;
  else if(modeCode==='B2B_SOLO'&&stadeCode==='DECOLLAGE')profil=2;
  else if(stadeCode==='PLATEAU'&&stopCode==='FREQUENCE')profil=3;
  else if(modeCode==='B2B_STRUCT'&&stadeCode==='SCALING')profil=4;
  else if(modeCode==='B2B_SOLO'&&stadeCode==='DEMARRAGE')profil=5;
  else if(modeCode==='B2C'&&stadeCode==='DECOLLAGE')profil=6;
  else if(stadeCode==='PLATEAU'&&stopCode==='MARGE')profil=7;
  else if(stopCode==='LEADS'&&stadeCode==='DEMARRAGE')profil=8;
  else if(modeCode==='B2C')profil=1;
  else profil=2;

  const PROFILES={
    1:{nom:"Coach Solo Démarrant",stoppeur:"LEADS",robinet:"R1 — Liste Dormante",message:"Je connais des gens qui pourraient avoir besoin de moi mais je ne sais pas comment les approcher sans paraître désespéré."},
    2:{nom:"Consultant B2B Invisible",stoppeur:"CONVERSION",robinet:"R2 — Prescripteurs",message:"J'ai des RDV, je présente bien, mais à la fin les gens me disent qu'ils vont réfléchir et je ne les revois plus."},
    3:{nom:"Formateur Plateau",stoppeur:"FREQUENCE",robinet:"R1 + R3 — Liste Dormante & Communautés",message:"J'ai de bons clients qui sont satisfaits mais ils n'achètent qu'une fois et je dois toujours repartir de zéro."},
    4:{nom:"Dirigeant PME Débordé",stoppeur:"CAPACITE",robinet:"R4 — Outreach Chirurgical",message:"Je suis débordé, je ne peux pas prendre plus de clients mais je n'ai pas encore les systèmes pour déléguer."},
    5:{nom:"Expert Technique Sans Visibilité",stoppeur:"LEADS",robinet:"R2 — Prescripteurs",message:"Je suis très bon dans ce que je fais, mes clients le savent, mais je ne sais pas comment toucher de nouveaux clients."},
    6:{nom:"Infopreneur Actif Sans Système",stoppeur:"CONVERSION",robinet:"R3 — Communautés",message:"J'ai des followers, du contenu, des gens qui me disent qu'ils aiment ce que je fais, mais ça ne se transforme pas en ventes."},
    7:{nom:"Professionnel Libéral en Stagnation",stoppeur:"MARGE",robinet:"R1 — Liste Dormante",message:"Je travaille beaucoup, mes clients sont satisfaits, mais à la fin du mois il ne reste presque rien."},
    8:{nom:"Entrepreneur Reconversion",stoppeur:"LEADS + POSITIONNEMENT",robinet:"R1 + R2 — Liste Dormante & Prescripteurs",message:"J'ai de l'expérience, je sais que je peux aider des gens, mais je n'arrive pas à expliquer clairement ce que je fais."},
    9:{nom:"Commerçant / E-commerçant en Croissance",stoppeur:"MARGE + FRÉQUENCE",robinet:"R1 + R3 — Réactivation Clients & Volume",message:"Je vends, j'ai des clients, mais la marge est trop faible et je dois constamment trouver de nouveaux acheteurs parce que personne ne revient régulièrement."}
  };
  return {profil, ...PROFILES[profil]};
}

function handlePDFUpload(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    window._pdfBase64=e.target.result.split(',')[1];
    window._pdfFilename=file.name;
    const fnEl=document.getElementById('pdf-filename');
    if(fnEl)fnEl.textContent='✓ '+file.name+' chargé';
    const uzEl=document.getElementById('upload-zone');
    if(uzEl)uzEl.style.borderColor='var(--green)';
    const btn=document.getElementById('btn-gen-rapport');
    if(btn){
      btn.disabled=false;
      btn.style.opacity='1';
      btn.style.cursor='pointer';
      btn.removeAttribute('disabled');
    }
    console.log('PDF chargé, btn trouvé:', !!btn, 'base64 longueur:', window._pdfBase64?.length);
  };
  reader.readAsDataURL(file);
}

function handlePDFDrop(e){
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file&&file.type==='application/pdf'){
    const fakeInput={files:[file]};
    handlePDFUpload(fakeInput);
  }
}

    P7:[['7.1','Specific Knowledge'],['7.2','Accountability'],['7.3','Avantage injuste composite'],['7.4','Levier Médiatique'],['7.5','Levier Capital'],['7.6','Levier Équipe'],['7.7','Levier Technologique'],['7.8','Répartition hebdomadaire réelle'],['7.9','Taux horaire aspirationnel'],['7.10','Niveau de confiance par domaine'],['7.11','Peur dominante'],['7.12','Croyance limitante la plus coûteuse'],['7.13','Pattern d'exécution'],['7.14','Long-term games'],['7.15','Système de pilotage KPIs']]

    const comment=responses['comment_'+pid];
    if(comment)lines.push('Commentaire Architecte : '+comment);

      const allKeys=Object.keys(responses).filter(k=>k.startsWith(key));

        allKeys.forEach(k=>{
          const val=responses[k];
          if(!val)return;
          if(typeof val==='string'&&val.trim()){
