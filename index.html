<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnostic Clarté Rentable™ — ISD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#F5F0E8;font-family:'DM Sans',sans-serif;min-height:100vh}
:root{--gold:#C9A84C;--dark:#080810;--dark2:#0F0F1A;--border:#2A2A3A;--text:#F5F0E8;--muted:#8A8A9A;--red:#C0392B;--green:#27AE60;--orange:#E67E22}
input,textarea,select{background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
input.error{border-color:var(--red)!important}
select option{background:var(--dark2)}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:6px;transition:all .2s}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
h1,h2,h3{font-family:'DM Serif Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:4px}
.gold-btn{background:var(--gold);color:var(--dark);padding:12px 24px;font-size:14px;font-weight:600;border-radius:6px;border:none}
.gold-btn:hover{opacity:.9;transform:translateY(-1px)}
.gold-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 20px;font-size:13px;border-radius:6px}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:24px}
.field-error{color:var(--red);font-size:11px;margin-top:4px}
.field-wrap{margin-bottom:18px}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.radio-opt{padding:8px 16px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s}
.radio-opt.active{border-color:var(--gold);color:var(--gold);background:#C9A84C11}
.radio-opt.err{border-color:var(--red)}
.score-bar-bg{background:var(--border);border-radius:4px;height:8px;overflow:hidden;margin-top:4px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.saving-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}
.page{animation:fadeInUp .3s ease}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr!important}}
#topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
#progressbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:16px}
#content{max-width:680px;margin:0 auto;padding:28px 20px 100px}
.nav-btns{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.meter-wrap{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;margin-bottom:20px}
.modal-overlay{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px #000c;animation:fadeInUp .3s ease}
.modal-box.wide{max-width:540px}
.admin-overlay{position:fixed;inset:0;background:#000d;z-index:200;display:flex;align-items:center;justify-content:center}
.admin-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;width:92vw;max-width:980px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.admin-layout{display:flex;flex:1;overflow:hidden}
.admin-sidebar{width:270px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.admin-detail{flex:1;overflow-y:auto;padding:20px}
@media(max-width:640px){.admin-layout{flex-direction:column}.admin-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:200px}}
#ai-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:var(--dark);font-size:20px;font-weight:700;border:none;cursor:pointer;z-index:100;box-shadow:0 4px 20px #C9A84C44}
#ai-panel{position:fixed;bottom:24px;right:24px;width:340px;height:460px;background:var(--dark2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;z-index:100;box-shadow:0 8px 40px #000c}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span style="color:var(--gold);font-weight:700;font-family:'DM Serif Display',serif;font-size:17px">⬡ Clarté Rentable™</span>
  <div style="display:flex;align-items:center;gap:8px">
    <input id="admin-input" type="password" placeholder="•••" style="width:60px;padding:4px 8px;font-size:12px"/>
    <button onclick="openAdmin()" style="background:var(--dark);border:1px solid var(--border);color:var(--muted);padding:4px 10px;font-size:11px;border-radius:4px">ADMIN</button>
    <span id="admin-err" style="font-size:10px;color:var(--red)"></span>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progressbar" class="hidden">
  <span id="save-status" style="font-size:11px;color:var(--muted);min-width:90px">✓ Sauvegardé</span>
  <div style="flex:1;background:var(--border);border-radius:4px;height:4px;overflow:hidden">
    <div id="progress-fill" style="height:100%;background:var(--gold);border-radius:4px;transition:width .5s;width:0%"></div>
  </div>
  <span id="progress-pct" style="font-size:12px;color:var(--gold);font-weight:700;min-width:36px">0%</span>
  <span id="progress-label" style="font-size:11px;color:var(--muted)"></span>
</div>

<!-- ERROR BANNER -->
<div id="error-banner" class="hidden" style="background:#C0392B18;border:1px solid #C0392B44;border-bottom:none;padding:10px 24px;text-align:center">
  <span style="color:var(--red);font-size:13px">⚠ Veuillez compléter les champs obligatoires marqués d'un <span style="color:var(--gold)">*</span> avant de continuer.</span>
</div>

<!-- MAIN CONTENT -->
<div id="content"></div>

<!-- AI BUTTON -->
<button id="ai-btn" class="hidden" onclick="toggleAI()" title="Assistant IA">✦</button>
<div id="ai-panel" class="hidden"></div>

<!-- MODALS -->
<div id="micro-modal" class="modal-overlay hidden"></div>
<div id="email-modal" class="modal-overlay hidden"></div>
<div id="admin-panel" class="admin-overlay hidden"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL = "https://jkpbhxssymkkfxpgvnub.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprcGJoeHNzeW1ra2Z4cGd2bnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTg0MjAsImV4cCI6MjA4ODY3NDQyMH0.hG-6wRPchKPZVYZB4RB_GjU5m1SXR7x5ykb5w-UveYM";
const API_ENDPOINT = "/.netlify/functions/claude"; // Proxy Netlify — clé sécurisée côté serveur

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const STEPS = ["welcome","s0","s1","s3","s4","s5","s6","s7","s8","objectif","result"];
const STEP_LABELS = {welcome:"Bienvenue",s0:"Profil",s1:"Période",s3:"Acquisition",s4:"Conversion",s5:"Monétisation",s6:"Capacité",s7:"Trésorerie",s8:"Marché",objectif:"Objectifs",result:"Résultats"};
const PILIER_LABELS = {leads:"Acquisition",conversion:"Conversion",marge:"Monétisation",capacite:"Capacité",tresorerie:"Trésorerie",marche:"Marché"};
const SECTION_TO_PILIER = {s3:"leads",s4:"conversion",s5:"marge",s6:"capacite",s7:"tresorerie",s8:"marche"};

let STATE = {
  step: "welcome",
  sessionId: null,
  data: {},
  isd: null,
  saveTimer: null,
  aiOpen: false,
  aiMsgs: [],
  fieldErrors: {}
};

// ═══════════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════════
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    console.error("Supabase error:", err);
    return null;
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function saveToSupabase() {
  if (!STATE.sessionId) return;
  const prenom = (STATE.data.s0||{}).prenom || "";
  const nom = (STATE.data.s0||{}).nom || "";
  const email = (STATE.data.s0||{}).email || "";
  const entreprise = (STATE.data.s0||{}).entreprise || "";
  const isd = STATE.isd || computeISD(STATE.data);

  const payload = {
    id: STATE.sessionId,
    prenom, nom, email, entreprise,
    step_actuel: STATE.step,
    data_json: STATE.data,
    score_global: isd.global || null,
    stoppeur: isd.stoppeur || null,
    scores_json: isd.scores || null,
    updated_at: new Date().toISOString()
  };

  await sbFetch("/rest/v1/diagnostics", {
    method: "POST",
    prefer: "resolution=merge-duplicates",
    headers: { "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify(payload)
  });
}

async function loadFromSupabase(sessionId) {
  const data = await sbFetch(`/rest/v1/diagnostics?id=eq.${sessionId}&select=*`);
  return data && data[0] ? data[0] : null;
}

async function loadAllDossiers() {
  const data = await sbFetch("/rest/v1/diagnostics?select=*&order=created_at.desc");
  return data || [];
}

async function updateAdminField(sessionId, fields) {
  await sbFetch(`/rest/v1/diagnostics?id=eq.${sessionId}`, {
    method: "PATCH",
    body: JSON.stringify(fields)
  });
}

// ═══════════════════════════════════════════════════
// LOCAL STORAGE (backup léger)
// ═══════════════════════════════════════════════════
function stor(key, val) {
  if (val === undefined) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
  } else {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }
}

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════
function computeISD(d) {
  const s3=d.s3||{},s4=d.s4||{},s5=d.s5||{},s6=d.s6||{},s7=d.s7||{},s8=d.s8||{};
  const leads = Math.min(Math.min((parseFloat(s3.prospects_mois)||0)/10*4,4)+Math.min((parseFloat(s3.taux_rdv)||0)/100*3,3)+(s3.autonomie==="oui"?3:0),10);
  const conversion = Math.min(Math.min((parseFloat(s4.taux_conversion)||0)/100*25,6)+(s4.promesse_mesurable==="oui"?1.5:0)+(s4.preuves==="oui"?1.5:0)+(s4.garantie==="forte"?2:s4.garantie==="partielle"?1:0),10);
  const marge = Math.min(Math.min((parseFloat(s5.marge_brute)||0)/100*6,6)+Math.min((parseFloat(s5.pct_upsell)||0)/100*2,2)+(s5.offre_recurrente==="oui"?2:0),10);
  const capacite = Math.min(Math.min((parseFloat(s6.heures_vente)||0)/10*2,2)+Math.min((parseFloat(s6.heures_delivery)||0)/20*3,3)+Math.min((parseFloat(s6.clients_simultanes)||0)/5*3,3)+(s6.casse_premier==="non"?2:1),10);
  const enc=parseFloat(s7.encaisse)||0,chg=parseFloat(s7.charges)||1;
  const tresorerie = Math.min(Math.min((enc/chg)*3,4)+Math.min((parseFloat(s7.runway_mois)||0)*0.6,4)+((10-(parseFloat(s7.stress)||5))*0.2),10);
  const marche = Math.min((parseFloat(s8.score_diff)||5)/10*8+((s8.concurrents||[]).filter(c=>c&&c.nom).length>0?2:0),10);
  const scores={leads,conversion,marge,capacite,tresorerie,marche};
  const global=Object.values(scores).reduce((a,b)=>a+b,0)/6;
  const stoppeur=Object.entries(scores).sort((a,b)=>a[1]-b[1])[0][0];
  return {scores,global:Math.round(global*10)/10,stoppeur};
}

function partialScore(section) {
  const d = STATE.data[section]||{};
  switch(section) {
    case "s3": return Math.min(Math.min((parseFloat(d.prospects_mois)||0)/10*4,4)+Math.min((parseFloat(d.taux_rdv)||0)/100*3,3)+(d.autonomie==="oui"?3:0),10);
    case "s4": return Math.min(Math.min((parseFloat(d.taux_conversion)||0)/100*25,6)+(d.promesse_mesurable==="oui"?1.5:0)+(d.preuves==="oui"?1.5:0)+(d.garantie==="forte"?2:d.garantie==="partielle"?1:0),10);
    case "s5": return Math.min(Math.min((parseFloat(d.marge_brute)||0)/100*6,6)+Math.min((parseFloat(d.pct_upsell)||0)/100*2,2)+(d.offre_recurrente==="oui"?2:0),10);
    case "s6": return Math.min(Math.min((parseFloat(d.heures_vente)||0)/10*2,2)+Math.min((parseFloat(d.heures_delivery)||0)/20*3,3)+Math.min((parseFloat(d.clients_simultanes)||0)/5*3,3)+(d.casse_premier==="non"?2:1),10);
    case "s7": { const e=parseFloat(d.encaisse)||0,c=parseFloat(d.charges)||1; return Math.min(Math.min((e/c)*3,4)+Math.min((parseFloat(d.runway_mois)||0)*0.6,4)+((10-(parseFloat(d.stress)||5))*0.2),10); }
    case "s8": return Math.min((parseFloat(d.score_diff)||5)/10*8+((d.concurrents||[]).filter(c=>c&&c.nom).length>0?2:0),10);
    default: return null;
  }
}

function scoreColor(s) { return s<4?"var(--red)":s<7?"var(--orange)":"var(--green)"; }
function scoreLabel(s) { return s<4?"Critique":s<7?"À améliorer":"Bon"; }

// ═══════════════════════════════════════════════════
// VALIDATION
// ═══════════════════════════════════════════════════
const REQUIRED = {
  s0: [{k:"prenom",l:"Prénom"},{k:"email",l:"Email"},{k:"entreprise",l:"Entreprise"},{k:"secteur",l:"Secteur"}],
  s1: [{k:"revenus_mois",l:"Revenus mensuels"}],
  s3: [{k:"prospects_mois",l:"Prospects/mois"},{k:"autonomie",l:"Autonomie"}],
  s4: [{k:"taux_conversion",l:"Taux de conversion"},{k:"garantie",l:"Garantie"}],
  s5: [{k:"marge_brute",l:"Marge brute"}],
  s6: [{k:"heures_vente",l:"Heures vente"},{k:"clients_simultanes",l:"Clients simultanés"}],
  s7: [{k:"encaisse",l:"Montant encaissé"},{k:"charges",l:"Charges fixes"}],
  s8: [{k:"score_diff",l:"Score différenciation"}],
  objectif: [{k:"objectif_revenu",l:"Objectif revenu"},{k:"delai",l:"Délai"}]
};

function validate(step) {
  const fields = REQUIRED[step]||[];
  const d = STATE.data[step]||{};
  const errs = {};
  fields.forEach(({k,l}) => {
    if (!d[k]||String(d[k]).trim()==="") errs[k]=`${l} est requis`;
    if (k==="email" && d[k] && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d[k])) errs[k]="Email invalide";
  });
  return errs;
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goTo(step) {
  STATE.step = step;
  STATE.fieldErrors = {};
  stor("session_step", step);
  updateProgress();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

async function goNext() {
  const idx = STEPS.indexOf(STATE.step);
  if (idx >= STEPS.length-1) return;

  const errs = validate(STATE.step);
  if (Object.keys(errs).length > 0) {
    STATE.fieldErrors = errs;
    render();
    window.scrollTo({top:0,behavior:"smooth"});
    return;
  }
  STATE.fieldErrors = {};

  // Créer sessionId au premier pas après welcome
  if (STATE.step === "welcome" && !STATE.sessionId) {
    STATE.sessionId = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    stor("session_id", STATE.sessionId);
  }

  const nextStep = STEPS[idx+1];
  const pilier = SECTION_TO_PILIER[STATE.step];

  // Autosave à Supabase à chaque section
  if (STATE.sessionId && STATE.step !== "welcome") {
    autoSave();
  }

  // Micro-sondage pour les sections piliers
  if (pilier) {
    showMicroSondage(pilier, partialScore(STATE.step), nextStep);
    return;
  }

  // Avant résultat : calculer ISD + sauvegarder + email modal
  if (nextStep === "result") {
    const isd = computeISD(STATE.data);
    STATE.isd = isd;
    await saveToSupabase();
    showEmailModal();
    return;
  }

  goTo(nextStep);
}

function goBack() {
  const idx = STEPS.indexOf(STATE.step);
  if (idx > 1) goTo(STEPS[idx-1]);
}

// ═══════════════════════════════════════════════════
// DATA UPDATE
// ═══════════════════════════════════════════════════
function updateData(section, key, value) {
  if (!STATE.data[section]) STATE.data[section]={};
  STATE.data[section][key] = value;
  STATE.fieldErrors = {};
  const pilier = SECTION_TO_PILIER[section];
  if (pilier && section===STATE.step) updateMeter(section);
  clearTimeout(STATE.saveTimer);
  const ss = document.getElementById('save-status');
  if(ss) ss.innerHTML = '<span class="saving-dot"></span> Sauvegarde…';
  STATE.saveTimer = setTimeout(()=>{
    stor("session_data", STATE.data);
    if(ss) ss.textContent = '✓ Sauvegardé';
  }, 1200);
}

function autoSave() {
  clearTimeout(STATE.saveTimer);
  STATE.saveTimer = setTimeout(async ()=>{
    stor("session_data", STATE.data);
    await saveToSupabase();
    const ss = document.getElementById('save-status');
    if(ss) ss.textContent = '✓ Sauvegardé';
  }, 1500);
}

function updateMeter(section) {
  const meterEl = document.getElementById('score-meter');
  if (!meterEl) return;
  const score = partialScore(section);
  if (score===null) return;
  const c = scoreColor(score);
  const pct = Math.min(score*10,100);
  const r=15.9, circ=2*Math.PI*r, dash=pct/100*circ;
  meterEl.innerHTML = `
    <div class="meter-wrap" style="background:${c}11;border:1px solid ${c}33">
      <div style="position:relative;width:48px;height:48px;flex-shrink:0">
        <svg viewBox="0 0 36 36" style="width:48px;height:48px;transform:rotate(-90deg)">
          <circle cx="18" cy="18" r="${r}" fill="none" stroke="var(--border)" stroke-width="3"/>
          <circle cx="18" cy="18" r="${r}" fill="none" stroke="${c}" stroke-width="3"
            stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${c}">${score.toFixed(1)}</div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--muted)">Score ${PILIER_LABELS[SECTION_TO_PILIER[section]]}</div>
        <div style="font-size:13px;font-weight:600;color:${c}">${scoreLabel(score)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Mis à jour en temps réel</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════
function updateProgress() {
  const pb = document.getElementById('progressbar');
  const step = STATE.step;
  if (step==="welcome") { pb.classList.add('hidden'); return; }
  pb.classList.remove('hidden');
  const idx = STEPS.indexOf(step);
  const total = STEPS.length-2;
  const pct = idx<=0?0:Math.round(((idx)/(total))*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-label').textContent = STEP_LABELS[step]||'';
}

// ═══════════════════════════════════════════════════
// MICRO-SONDAGE
// ═══════════════════════════════════════════════════
const LECTURES = {
  leads:{
    critique:{emoji:"🔴",titre:"Acquisition — Zone critique",corps:"ce score confirme que le flux entrant est le frein principal. Votre machine ne manque pas de carburant par hasard — on va identifier exactement ce qui bloque l'entrée lors de notre session.",insight:"Le Stoppeur est probablement ici. On y consacrera le plus de temps."},
    moyen:{emoji:"🟡",titre:"Acquisition — Flux instable",corps:"vous avez des prospects — mais de façon irrégulière. Le système fonctionne, mais il dépend encore trop de vous ou d'un seul canal. On verra comment le stabiliser.",insight:"Ce n'est pas votre stoppeur principal, mais une fragilité à corriger."},

      ${STATE.aiMsgs.length===0?`<div style="padding:12px"><p style="color:var(--muted);font-size:12px;margin-bottom:10px">Je connais vos réponses dans cette section. Posez-moi vos questions :</p>${qq?`<button onclick="aiSend('${qq.replace(/'/g,"\\'")}') " style="background:#C9A84C15;border:1px solid #C9A84C44;color:var(--gold);padding:8px 12px;border-radius:8px;font-size:12px;width:100%;text-align:left;cursor:pointer">${qq}</button>`:""}`  :msgsHtml}

      <input id="ai-input" placeholder="Votre question…" style="flex:1;font-size:12px;padding:8px 10px" onkeydown="if(event.key==='Enter')aiSend()"/>

    </div>`;
}

async function aiSend(preset) {
  const input = document.getElementById('ai-input');
  const msg = preset||input?.value?.trim();
  if (!msg) return;
  if (input) input.value = '';
  STATE.aiMsgs.push({role:"user",content:msg});
  renderAIPanel();
  document.getElementById('ai-loading')?.classList.remove('hidden');
  try {
    const resp = await fetch(API_ENDPOINT,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,
        system:`Tu es l'assistant de l'Architecte de Clarté Rentable™. Section: ${STEP_LABELS[STATE.step]||STATE.step}. Réponds en français, concis, bienveillant. Max 3 phrases.`,
        messages:STATE.aiMsgs})
    });
    const json = await resp.json();
    STATE.aiMsgs.push({role:"assistant",content:json.content?.[0]?.text||"Désolé, erreur."});
  } catch { STATE.aiMsgs.push({role:"assistant",content:"Erreur de connexion."}); }
  renderAIPanel();
  const msgs = document.getElementById('ai-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
}

function field(label, key, section, opts={}) {
  const val = (STATE.data[section]||{})[key]||"";
  const err = STATE.fieldErrors[key]||"";
  const req = opts.required;
  const wrap = document.createElement('div');
  wrap.className='field-wrap';
  const lbl = document.createElement('label');
  lbl.innerHTML = label+(req?` <span style="color:var(--gold)">*</span>`:"");
  wrap.appendChild(lbl);
  let inp;
  if(opts.type==="textarea"){
    inp=document.createElement('textarea');
    inp.rows=opts.rows||2;inp.style.resize="vertical";
    inp.value=val;inp.placeholder=opts.placeholder||"";
  } else if(opts.type==="range"){
    inp=document.createElement('input');
    inp.type="range";inp.min=opts.min||1;inp.max=opts.max||10;
    inp.value=val||opts.default||5;
    inp.style.width="100%";inp.style.accentColor="var(--gold)";
    const disp=document.createElement('div');
    disp.style.cssText="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px";
    const mid=document.createElement('span');
    mid.style.cssText="color:var(--gold);font-weight:700;font-size:14px";
    mid.textContent=inp.value;mid.id="range-disp-"+key;
    disp.innerHTML=`<span>${opts.minLabel||"1"}</span>`;
    disp.appendChild(mid);
    disp.innerHTML+=`<span>${opts.maxLabel||"10"}</span>`;
    inp.oninput=()=>{updateData(section,key,inp.value);const d2=document.getElementById("range-disp-"+key);if(d2)d2.textContent=inp.value;};
    wrap.appendChild(inp);wrap.appendChild(disp);
    updateData(section,key,inp.value);
    return wrap;
  } else {
    inp=document.createElement('input');
    inp.type=opts.type||"text";
    inp.value=val;inp.placeholder=opts.placeholder||"";
  }
  if(err){inp.classList.add('error');}
  inp.oninput=()=>updateData(section,key,inp.value);
  if(opts.type==="textarea") inp.oninput=()=>updateData(section,key,inp.value);
  wrap.appendChild(inp);
  if(err){const e2=document.createElement('div');e2.className='field-error';e2.textContent="⚠ "+err;wrap.appendChild(e2);}
  return wrap;
}

function radioGroup(label, key, section, options, opts={}) {
  const val=(STATE.data[section]||{})[key]||"";
  const err=STATE.fieldErrors[key]||"";
  const req=opts.required;
  const wrap=document.createElement('div');wrap.className='field-wrap';
  const lbl=document.createElement('label');
  lbl.innerHTML=label+(req?` <span style="color:var(--gold)">*</span>`:"");
  wrap.appendChild(lbl);
  const grp=document.createElement('div');grp.className='radio-group';
  options.forEach(({value,label:l})=>{
    const btn=document.createElement('button');
    btn.className='radio-opt'+(val===value?" active":"")+(err&&!val?" err":"");
    btn.textContent=l;
    btn.onclick=()=>{updateData(section,key,value);grp.querySelectorAll('.radio-opt').forEach(b=>{b.classList.remove('active','err');});btn.classList.add('active');};
    grp.appendChild(btn);
  });
  wrap.appendChild(grp);
  if(err){const e2=document.createElement('div');e2.className='field-error';e2.textContent="⚠ "+err;wrap.appendChild(e2);}
  return wrap;
}

function meter(section) {
  const div=document.createElement('div');div.id='score-meter';
  setTimeout(()=>updateMeter(section),100);
  return div;
}

function navBtns(isLast) {
  const div=document.createElement('div');div.className='nav-btns';
  const back=document.createElement('button');back.className='ghost-btn';back.textContent='← Retour';
  back.disabled=STEPS.indexOf(STATE.step)<=1;
  back.onclick=goBack;
  const next=document.createElement('button');next.className='gold-btn';
  next.textContent=isLast?"Voir mes résultats →":"Continuer →";
  next.onclick=goNext;
  div.appendChild(back);div.appendChild(next);
  return div;
}

  const g=document.createElement('div');g.className='grid2';
  g.appendChild(field("Heures/semaine dédiées à la vente","heures_vente","s6",{type:"number",required:true,placeholder:"Ex : 10"}));
  g.appendChild(field("Heures/semaine dédiées au delivery","heures_delivery","s6",{type:"number",placeholder:"Ex : 20"}));
  div.appendChild(g);
  div.appendChild(field("Nombre de clients servis simultanément","clients_simultanes","s6",{type:"number",required:true,placeholder:"Ex : 5"}));
  div.appendChild(radioGroup("Avez-vous un résultat concret et mesurable avec un client ?","casse_premier","s6",[{value:"non",label:"Oui — résultat prouvé"},{value:"oui",label:"Non — pas encore"}]));
  div.appendChild(field("Taille de l'équipe (vous compris)","taille_equipe","s6",{type:"number",placeholder:"Ex : 2"}));
  div.appendChild(navBtns(false));
  setTimeout(()=>updateMeter("s6"),50);
  return div;
}

function renderS7() {
  const div=document.createElement('div');div.className='page';
  div.appendChild(meter("s7"));
  div.innerHTML+=`<h2 style="color:var(--gold);margin-bottom:6px">Pilier 5 — Trésorerie</h2><p style="color:var(--muted);font-size:13px;margin-bottom:24px">L'oxygène du business. Soyez aussi précis que possible.</p>`;
  const g=document.createElement('div');g.className='grid2';
  g.appendChild(field("Montant encaissé ce mois (DHS)","encaisse","s7",{type:"number",required:true,placeholder:"Ex : 8 000"}));
  g.appendChild(field("Charges fixes mensuelles (DHS)","charges","s7",{type:"number",required:true,placeholder:"Ex : 4 000"}));
  div.appendChild(g);
  div.appendChild(field("Runway : mois de fonctionnement sans nouveaux revenus","runway_mois","s7",{type:"number",placeholder:"Ex : 3"}));
  const stressWrap=document.createElement('div');stressWrap.className='field-wrap';
  const stressLbl=document.createElement('label');stressLbl.textContent="Niveau de stress financier (1 = serein · 10 = critique)";
  const stressInp=document.createElement('input');stressInp.type="range";stressInp.min=1;stressInp.max=10;
  const curStress=(STATE.data.s7||{}).stress||5;
  stressInp.value=curStress;stressInp.style.cssText="width:100%;accent-color:var(--gold);margin-top:8px";
  const stressDisp=document.createElement('div');
  stressDisp.style.cssText="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px";
  stressDisp.innerHTML=`<span>1 — Serein</span><span id="stress-val" style="color:var(--gold);font-weight:700;font-size:14px">${curStress}</span><span>10 — Critique</span>`;
  stressInp.oninput=()=>{updateData("s7","stress",stressInp.value);document.getElementById("stress-val").textContent=stressInp.value;};
  stressWrap.appendChild(stressLbl);stressWrap.appendChild(stressInp);stressWrap.appendChild(stressDisp);
  div.appendChild(stressWrap);
  div.appendChild(field("Délai de paiement moyen de vos clients (jours)","delai_paiement","s7",{type:"number",placeholder:"Ex : 30"}));
  div.appendChild(navBtns(false));
  setTimeout(()=>updateMeter("s7"),50);
  return div;
}

function renderS8() {
  const div=document.createElement('div');div.className='page';
  div.appendChild(meter("s8"));
  div.innerHTML+=`<h2 style="color:var(--gold);margin-bottom:6px">Pilier 6 — Marché & Concurrence</h2><p style="color:var(--muted);font-size:13px;margin-bottom:24px">Comment vous positionnez-vous par rapport à votre marché ?</p>`;
  const diffWrap=document.createElement('div');diffWrap.className='field-wrap';
  const diffLbl=document.createElement('label');
  diffLbl.innerHTML='Score de différenciation perçue <span style="color:var(--gold)">*</span>';
  const diffSub=document.createElement('p');diffSub.style.cssText="font-size:11px;color:var(--muted);margin-bottom:8px";diffSub.textContent="1 = vous ressemblez à tout le monde · 10 = vous êtes clairement unique";
  const diffInp=document.createElement('input');diffInp.type="range";diffInp.min=1;diffInp.max=10;
  const curDiff=(STATE.data.s8||{}).score_diff||5;
  diffInp.value=curDiff;diffInp.style.cssText="width:100%;accent-color:var(--gold)";
  const diffDisp=document.createElement('div');
  diffDisp.style.cssText="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px";
  diffDisp.innerHTML=`<span>1 — Indifférencié</span><span id="diff-val" style="color:var(--gold);font-weight:700;font-size:14px">${curDiff}/10</span><span>10 — Unique</span>`;
  diffInp.oninput=()=>{updateData("s8","score_diff",diffInp.value);document.getElementById("diff-val").textContent=diffInp.value+"/10";};
  diffWrap.appendChild(diffLbl);diffWrap.appendChild(diffSub);diffWrap.appendChild(diffInp);diffWrap.appendChild(diffDisp);
  div.appendChild(diffWrap);
  div.appendChild(field("Votre positionnement en une phrase","positionnement","s8",{placeholder:"Ex : J'aide les PME industrielles à réduire leurs délais de production de 40%"}));
  const concWrap=document.createElement('div');concWrap.className='field-wrap';
  const concLbl=document.createElement('label');concLbl.textContent="Vos principaux concurrents";
  concWrap.appendChild(concLbl);
  const concs=(STATE.data.s8||{}).concurrents||[{},{},{}];
  concs.slice(0,3).forEach((c,i)=>{
    const row=document.createElement('div');row.style.cssText="background:var(--dark);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border)";
    row.innerHTML=`<div style="font-size:11px;color:var(--gold);margin-bottom:8px;font-weight:600">Concurrent ${i+1}</div>`;
    const g3=document.createElement('div');g3.className='grid3';
    ['nom','force','faiblesse'].forEach((fld,j)=>{
      const fw=document.createElement('div');fw.className='field-wrap';fw.style.margin=0;
      const l=document.createElement('label');l.style.marginBottom='4px';l.textContent=['Nom','Sa force','Sa faiblesse'][j];
      const inp=document.createElement('input');inp.value=c[fld]||"";inp.placeholder=['Ex : Concurrent A','Ce qu\'il fait bien','Son point faible'][j];
      inp.oninput=()=>{
        const arr=(STATE.data.s8||{}).concurrents||[{},{},{}];
        if(!arr[i])arr[i]={};
        arr[i][fld]=inp.value;
        updateData("s8","concurrents",arr);
      };
      fw.appendChild(l);fw.appendChild(inp);g3.appendChild(fw);
    });
    row.appendChild(g3);concWrap.appendChild(row);
  });
  div.appendChild(concWrap);
  div.appendChild(navBtns(false));
  setTimeout(()=>updateMeter("s8"),50);
  return div;
}

function renderObjectif() {
  const div=document.createElement('div');div.className='page';
  div.innerHTML=`<h2 style="color:var(--gold);margin-bottom:6px">Objectifs & Synthèse Finale</h2><p style="color:var(--muted);font-size:13px;margin-bottom:24px">Dernière étape. Ces réponses guident la personnalisation de votre rapport.</p>`;
  const g=document.createElement('div');g.className='grid2';
  g.appendChild(field("Objectif de revenu mensuel cible (DHS)","objectif_revenu","objectif",{type:"number",required:true,placeholder:"Ex : 30 000"}));
  const delaiDiv=document.createElement('div');
  delaiDiv.appendChild(radioGroup("Délai pour atteindre cet objectif","delai","objectif",[{value:"3mois",label:"3 mois"},{value:"6mois",label:"6 mois"},{value:"12mois",label:"12 mois"},{value:"24mois",label:"24 mois"}],{required:true}));
  g.appendChild(delaiDiv);
  div.appendChild(g);
  div.appendChild(field("Décrivez votre situation actuelle en une phrase","phrase1","objectif",{type:"textarea",rows:2,placeholder:"Ex : Je travaille dur mais le cash ne suit pas…"}));
  div.appendChild(field("Qu'est-ce qui vous empêche d'atteindre votre objectif ?","phrase2","objectif",{type:"textarea",rows:2,placeholder:"Ex : Je manque de prospects qualifiés…"}));
  div.appendChild(field("Si vous pouviez changer une seule chose maintenant, ce serait…","phrase3","objectif",{type:"textarea",rows:2}));
  div.appendChild(navBtns(true));
  return div;
}

async function renderResult() {
  document.getElementById('ai-btn').classList.add('hidden');
  const isd=STATE.isd;
  if(!isd) return document.createElement('div');
  const {scores,global,stoppeur}=isd;
  const gc=global<4?"var(--red)":global<7?"var(--orange)":"var(--green)";
  const stoppeurLabel=PILIER_LABELS[stoppeur]||stoppeur;
  const div=document.createElement('div');div.className='page';

  const scoreCard=document.createElement('div');
  scoreCard.style.cssText="text-align:center;margin-bottom:32px;padding:32px 24px;background:var(--dark2);border-radius:12px;border:1px solid var(--border)";
  scoreCard.innerHTML=`
    <p style="color:var(--muted);font-size:13px;margin-bottom:8px">Score ISD™ Global</p>
    <div style="font-size:4.5rem;font-weight:700;color:${gc};font-family:'DM Serif Display',serif;line-height:1">${global}</div>
    <div style="font-size:18px;color:var(--muted);margin-bottom:20px">/10</div>
    <div style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#C0392B18;border:1px solid #C0392B44;border-radius:24px">
      <span style="color:var(--red);font-size:14px">⚠</span>
      <span style="color:var(--red);font-weight:700;font-size:14px">Stoppeur Dominant : ${stoppeurLabel}</span>
    </div>`;
  div.appendChild(scoreCard);

  const barsDiv=document.createElement('div');barsDiv.style.cssText="display:flex;flex-direction:column;gap:12px;margin-bottom:28px";
  Object.entries(scores).forEach(([k,v])=>{
    const vc=v<4?"var(--red)":v<7?"var(--orange)":"var(--green)";
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:14px;padding:10px 14px;background:var(--dark2);border-radius:8px;border:1px solid ${k===stoppeur?"#C0392B55":"var(--border)"}`;
    row.innerHTML=`
      <span style="width:120px;font-size:13px;color:var(--text);font-weight:${k===stoppeur?700:400}">${k===stoppeur?"⚠ ":""}${PILIER_LABELS[k]||k}</span>
      <div style="flex:1"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${Math.min(v*10,100)}%;background:${vc}"></div></div></div>
      <span style="width:44px;text-align:right;font-size:14px;font-weight:700;color:${vc}">${v.toFixed(1)}</span>`;
    barsDiv.appendChild(row);
  });
  div.appendChild(barsDiv);

  const aiCard=document.createElement('div');
  aiCard.style.cssText="background:var(--dark2);border:1px solid #C9A84C33;border-radius:12px;padding:24px;margin-bottom:24px";
  aiCard.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="color:var(--gold);font-size:16px">✦</span><h3 style="color:var(--gold);font-size:15px">Analyse de l'Architecte de Clarté Rentable™</h3></div><div id="ai-analysis"><span style="color:var(--muted);font-size:13px"><span class="saving-dot"></span> Analyse de votre profil en cours…</span></div>`;
  div.appendChild(aiCard);

  const cta=document.createElement('div');
  cta.style.cssText="background:#C9A84C0d;border:1px solid #C9A84C33;border-radius:12px;padding:24px";
  cta.innerHTML=`
    <h3 style="color:var(--gold);margin-bottom:10px">Prochaine étape</h3>
    <p style="color:var(--text);font-size:14px;line-height:1.7;margin-bottom:16px">Votre dossier a été transmis à l'Architecte de Clarté Rentable™. Une analyse complète avec votre <strong>plan d'action 30 jours</strong> et votre <strong>action prioritaire 48h</strong> vous sera remise lors de votre session.</p>
    <div style="padding:12px 16px;background:#27AE6018;border-radius:8px;border:1px solid #27AE6044">
      <p style="font-size:13px;color:var(--green);font-weight:600">✓ Dossier reçu — vous serez contacté sous 48 heures ouvrées.</p>
    </div>`;
  div.appendChild(cta);

  const prenom=(STATE.data.s0||{}).prenom||"";
  fetch(API_ENDPOINT,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
      messages:[{role:"user",content:`Tu es l'Architecte de Clarté Rentable™. En 3 paragraphes courts et percutants, dis à ${prenom||"ce dirigeant"} ce que révèle son score ISD™. Score global: ${global}/10. Stoppeur dominant: ${stoppeurLabel} (score: ${scores[stoppeur]?.toFixed(1)}). Tous les scores: ${JSON.stringify(scores)}. Commence par "Votre diagnostic révèle…". Ne mentionne jamais Hormozi, Goldratt, Jay Abraham, Naval.`}]})
  }).then(r=>r.json()).then(json=>{
    const txt=json.content?.[0]?.text||"";
    const el=document.getElementById('ai-analysis');
    if(el) el.innerHTML=txt.split(/\n+/).filter(Boolean).map(p=>`<p style="color:var(--text);font-size:14px;line-height:1.8;margin-bottom:10px">${p}</p>`).join('');
  }).catch(()=>{
    const el=document.getElementById('ai-analysis');
    if(el) el.textContent="Analyse disponible lors de votre session de restitution.";
  });

  return div;
}

// ═══════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════
async function render() {
  const content=document.getElementById('content');
  const errBanner=document.getElementById('error-banner');
  const hasErrs=Object.keys(STATE.fieldErrors).length>0;
  errBanner.classList.toggle('hidden',!hasErrs);
  const showAI=!["welcome","result"].includes(STATE.step);
  document.getElementById('ai-btn').classList.toggle('hidden',!showAI);
  if(!showAI&&STATE.aiOpen){STATE.aiOpen=false;document.getElementById('ai-panel').classList.add('hidden');}
  updateProgress();
  let page;
  switch(STATE.step){
    case "welcome": page=renderWelcome(); break;
    case "s0": page=renderS0(); break;
    case "s1": page=renderS1(); break;
    case "s3": page=renderS3(); break;
    case "s4": page=renderS4(); break;
    case "s5": page=renderS5(); break;
    case "s6": page=renderS6(); break;
    case "s7": page=renderS7(); break;
    case "s8": page=renderS8(); break;
    case "objectif": page=renderObjectif(); break;
    case "result": page=await renderResult(); break;
    default: page=document.createElement('div');
  }
  content.innerHTML='';
  content.appendChild(page);
}

// ═══════════════════════════════════════════════════
// BOOT — Reprendre session si existante
// ═══════════════════════════════════════════════════
(async function boot() {
  const savedId = stor("session_id");
  const savedData = stor("session_data");
  const savedStep = stor("session_step");
  if (savedId && savedData) {
    STATE.sessionId = savedId;
    STATE.data = savedData;
    if (savedStep && savedStep !== "result") {
      STATE.step = savedStep;
    }
  }
  render();
})();
</script>
</body>
</html>
