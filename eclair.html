<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnostic Éclair ISD™ — Séquence Dominante Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#F5F0E8;font-family:'DM Sans',sans-serif;min-height:100vh}
:root{--gold:#C9A84C;--dark:#080810;--dark2:#0F0F1A;--border:#2A2A3A;--text:#F5F0E8;--muted:#8A8A9A;--red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#2C5282}
input,textarea{background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--gold)}
input.error,textarea.error{border-color:var(--red)!important}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:6px;transition:all .2s}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
h1,h2,h3{font-family:'DM Serif Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:4px}
.gold-btn{background:var(--gold);color:var(--dark);padding:12px 24px;font-size:14px;font-weight:600;border-radius:6px;border:none;width:100%}
.gold-btn:hover{opacity:.9;transform:translateY(-1px)}
.gold-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 20px;font-size:13px;border-radius:6px}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}
.field-wrap{margin-bottom:18px}
.field-error{color:var(--red);font-size:11px;margin-top:4px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeInUp .35s ease}
.saving-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}
.hidden{display:none!important}
#topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
#progressbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:16px}
#content{max-width:620px;margin:0 auto;padding:32px 20px 100px}
.choice-card{background:var(--dark2);border:2px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left;width:100%}
.choice-card:hover{border-color:var(--gold);background:#C9A84C08}
.choice-card.selected{border-color:var(--gold);background:#C9A84C12}
.choice-card .choice-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.choice-card .choice-sub{font-size:12px;color:var(--muted);line-height:1.5}
.nav-btns{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);gap:12px}
.insight-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.insight-item:last-child{border-bottom:none}
.admin-overlay{position:fixed;inset:0;background:#000d;z-index:200;display:flex;align-items:center;justify-content:center}
.admin-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;width:95vw;max-width:1000px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.admin-layout{display:flex;flex:1;overflow:hidden}
.admin-sidebar{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.admin-detail{flex:1;overflow-y:auto;padding:20px}
@media(max-width:640px){.admin-layout{flex-direction:column}.admin-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:220px}}
</style>
</head>
<body>
<div id="admin-panel" class="admin-overlay hidden"></div>
<!-- TOP BAR -->
<div id="topbar">
  <span style="color:var(--gold);font-weight:700;font-family:'DM Serif Display',serif;font-size:17px">⬡ Séquence Dominante Academy™</span>
  <div style="display:flex;align-items:center;gap:8px">
    <input id="admin-input" type="password" placeholder="•••" style="width:60px;padding:4px 8px;font-size:12px"/>

  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progressbar" class="hidden">
  <div style="flex:1;background:var(--border);border-radius:4px;height:4px;overflow:hidden">

  </div>

</div>

<div id="content"></div>

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════
async function sbSave() {
  if (!STATE.sessionId) return;
  const d = STATE.data;
  try {
    await fetch(SUPABASE_URL + "/rest/v1/diagnostics", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({
        id: STATE.sessionId,
        email: d.email || "",
        prenom: d.prenom || "",
        nom: d.nom || "",
        entreprise: d.entreprise || "",
        step_actuel: STATE.step,
        data_json: STATE.data,
        stoppeur: STATE.stoppeur?.nom || null,
        statut_suivi: "nouveau",
        source: "eclair",
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) { console.error("Supabase:", e); }
}

// Fallback si combinaison non trouvée
function getStoppeur(q1, q2) {
  const key = q1 + "-" + q2;
  if (STOPPEURS[key]) return STOPPEURS[key];
  // Fallback par Q1
  const fallbacks = {
    "A": STOPPEURS["A-A"], "B": STOPPEURS["B-A"],
    "C": STOPPEURS["C-A"], "D": STOPPEURS["D-A"], "E": STOPPEURS["E-D"]
  };
  return fallbacks[q1] || STOPPEURS["A-A"];
}

function calculeUrgence(q3) {
  if (q3 === "A") return "critique";
  if (q3 === "B") return "haute";
  return "normale";
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goTo(step) {
  STATE.step = step;
  STATE.fieldErrors = {};
  updateProgress();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function goNext() {
  const idx = STEPS.indexOf(STATE.step);

  // Validation email
  if (STATE.step === "email") {
    const errs = {};
    if (!STATE.data.email?.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(STATE.data.email)) errs.email = "Email valide requis";
    if (!STATE.data.prenom?.trim()) errs.prenom = "Prénom requis";
    if (Object.keys(errs).length > 0) { STATE.fieldErrors = errs; render(); return; }
    if (!STATE.sessionId) {
      STATE.sessionId = "eclair_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
    }
    sbSave();
  }

  // Validation questions choix
  if (["q1","q2","q3","q4"].includes(STATE.step)) {
    if (!STATE.data[STATE.step]) {
      STATE.fieldErrors[STATE.step] = "Veuillez sélectionner une réponse";
      render(); return;
    }
  }

  // Validation Q5 texte libre
  if (STATE.step === "q5") {
    if (!STATE.data.q5?.trim() || STATE.data.q5.trim().length < 10) {
      STATE.fieldErrors.q5 = "Décrivez votre situation en au moins quelques mots";
      render(); return;
    }
    // Calculer stoppeur
    STATE.stoppeur = getStoppeur(STATE.data.q1, STATE.data.q2);
    STATE.urgence = calculeUrgence(STATE.data.q3);
    sbSave();
    goTo("calcul");
    setTimeout(() => goTo("resultat"), 3000);
    return;
  }

  goTo(STEPS[idx+1]);
}

function goBack() {
  const idx = STEPS.indexOf(STATE.step);
  if (idx > 1) goTo(STEPS[idx-1]);
}

function setChoice(key, value) {
  STATE.data[key] = value;
  STATE.fieldErrors = {};
  render();
}

// ═══════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════
function updateProgress() {
  const pb = document.getElementById('progressbar');
  const questionSteps = ["email","q1","q2","q3","q4","q5"];
  if (!questionSteps.includes(STATE.step)) { pb.classList.add('hidden'); return; }
  pb.classList.remove('hidden');
  const idx = questionSteps.indexOf(STATE.step);
  const pct = Math.round(((idx+1)/questionSteps.length)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-label').textContent = STEP_LABELS[STATE.step]||'';
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function choiceGroup(key, options) {
  const selected = STATE.data[key]||"";
  const err = STATE.fieldErrors[key]||"";
  const wrap = document.createElement('div');
  if(err){ const e=document.createElement('div');e.style.cssText="color:var(--red);font-size:12px;margin-bottom:12px;padding:8px 12px;background:#C0392B15;border-radius:6px";e.textContent="⚠ Veuillez sélectionner une réponse";wrap.appendChild(e); }
  options.forEach(({value, label, sub}) => {
    const btn = document.createElement('button');
    btn.className = 'choice-card' + (selected===value?' selected':'');
    btn.innerHTML = `<div class="choice-label">${label}</div>${sub?`<div class="choice-sub">${sub}</div>`:''}`;
    btn.onclick = () => setChoice(key, value);
    wrap.appendChild(btn);
  });
  return wrap;
}

function inputField(label, key, opts={}) {
  const val = STATE.data[key]||"";
  const err = STATE.fieldErrors[key]||"";
  const wrap = document.createElement('div');
  wrap.className='field-wrap';
  if(label){ const lbl=document.createElement('label');lbl.innerHTML=label+` <span style="color:var(--gold)">*</span>`;wrap.appendChild(lbl); }
  const inp = document.createElement('input');
  inp.type=opts.type||"text";inp.value=val;inp.placeholder=opts.placeholder||"";
  if(err) inp.classList.add('error');
  inp.oninput=()=>{STATE.data[key]=inp.value;STATE.fieldErrors[key]="";};
  wrap.appendChild(inp);
  if(err){const e=document.createElement('div');e.className='field-error';e.textContent="⚠ "+err;wrap.appendChild(e);}
  return wrap;
}

function navBtns(showBack=true, nextLabel="Continuer →") {
  const div=document.createElement('div');div.className='nav-btns';
  if(showBack){const back=document.createElement('button');back.className='ghost-btn';back.textContent='← Retour';back.onclick=goBack;div.appendChild(back);}
  const next=document.createElement('button');next.className='gold-btn';next.style.flex='1';next.textContent=nextLabel;next.onclick=goNext;
  div.appendChild(next);
  return div;
}

async function renderAdmin() {
  const panel = document.getElementById('admin-panel');
  panel.classList.remove('hidden');
  panel.innerHTML=`<div class="admin-box"><div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#C9A84C08"><span style="color:var(--gold);font-weight:700;font-size:15px">⬡ Admin — Diagnostic Éclair ISD™</span><button onclick="document.getElementById('admin-panel').classList.add('hidden')" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer">×</button></div><div style="padding:40px;text-align:center;color:var(--muted)"><span class="saving-dot"></span> Chargement…</div></div>`;

  let dossiers = [];
  try {
    const res = await fetch(SUPABASE_URL+"/rest/v1/diagnostics?select=*&order=created_at.desc&limit=100",{
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
    dossiers = await res.json();
  } catch(e) { dossiers=[]; }

  function timeAgo(d){
    if(!d)return"—";
    const diff=Math.floor((Date.now()-new Date(d).getTime())/86400000);
    return diff===0?"aujourd'hui":diff===1?"hier":`il y a ${diff}j`;
  }

  const listHtml = (dossiers||[]).map(d=>`
    <div onclick="selectDossier('${d.id}')" style="padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:5px;background:var(--dark);border:1px solid var(--border)" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="display:flex;justify-content:space-between">
        <div style="font-size:13px;font-weight:600">${d.prenom||"—"} ${d.nom||""}</div>
        <div style="font-size:10px;color:var(--muted)">${timeAgo(d.created_at)}</div>
      </div>
      <div style="font-size:11px;color:var(--muted)">${d.entreprise||d.email||"—"}</div>
      <div style="font-size:10px;color:var(--gold);margin-top:3px">${d.statut_suivi||"nouveau"}</div>
    </div>`).join('');

  panel.innerHTML=`
    <div class="admin-box">
      <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#C9A84C08">
        <span style="color:var(--gold);font-weight:700;font-size:15px">⬡ Admin — Diagnostic Éclair ISD™ <span style="font-size:12px;color:var(--muted)">(${(dossiers||[]).length} soumissions)</span></span>
        <div style="display:flex;gap:8px;align-items:center">
          <button onclick="exportCSV()" style="background:#C9A84C18;border:1px solid #C9A84C44;color:var(--gold);padding:5px 12px;font-size:11px;border-radius:4px">📥 CSV</button>
          <button onclick="document.getElementById('admin-panel').classList.add('hidden')" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer">×</button>
        </div>
      </div>
      <div class="admin-layout">
        <div class="admin-sidebar">
          <div style="padding:8px 12px;border-bottom:1px solid var(--border)">
            <input placeholder="🔍 Rechercher…" style="font-size:12px;padding:6px 10px" oninput="filterList(this.value)"/>
          </div>
          <div id="admin-list" style="flex:1;overflow-y:auto;padding:8px">${listHtml||'<p style="color:var(--muted);font-size:12px;padding:12px">Aucune soumission</p>'}</div>
        </div>
        <div class="admin-detail" id="admin-detail">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted)">
            <div style="font-size:40px;margin-bottom:12px">⬡</div>
            <p>Sélectionnez une soumission</p>
          </div>
        </div>
      </div>
    </div>`;
  window._dossiers = dossiers||[];
  window._timeAgo = timeAgo;
}

function filterList(q) {
  const items = document.querySelectorAll('#admin-list > div');
  (window._dossiers||[]).forEach((d,i)=>{
    const txt=`${d.prenom||""} ${d.nom||""} ${d.email||""} ${d.entreprise||""}`.toLowerCase();
    if(items[i]) items[i].style.display=txt.includes(q.toLowerCase())?"":"none";
  });
}

async function selectDossier(id) {
  const d=(window._dossiers||[]).find(x=>x.id===id);
  if(!d)return;
  const data=d.data_json||{};
  const timeAgo=window._timeAgo||(()=>"");
  const statutOpts=["nouveau","à contacter","appel planifié","client","non retenu"];
  const STOPPEUR_NOMS_LOCAL = {
    leads:"Absence de système d'acquisition", conversion:"Blocage exécution closing",
    marge:"Dilution marges", capacite:"Plafond capacité atteint",
    tresorerie:"Pression trésorerie — flux insuffisant", marche:"Différenciation absente"
  };
  const stoppeurNom = d.stoppeur && STOPPEUR_NOMS_LOCAL[d.stoppeur] ? STOPPEUR_NOMS_LOCAL[d.stoppeur] : (d.stoppeur||"Non identifié");

  document.getElementById('admin-detail').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 style="color:var(--gold);margin-bottom:4px">${d.prenom||""} ${d.nom||""}</h2>
        <p style="color:var(--muted);font-size:13px">${d.entreprise||"—"}</p>
        <p style="font-size:11px;color:var(--muted);margin-top:3px">${d.email||"—"} · ${timeAgo(d.created_at)}</p>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Stoppeur ISD™ identifié</div>
        <div style="background:#C0392B18;border:1px solid #C0392B44;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--red)">${stoppeurNom}</div>
      </div>
    </div>

    <div style="background:var(--dark);border-radius:8px;padding:14px;margin-bottom:14px;border:1px solid var(--border)">
      <div style="font-size:12px;color:var(--gold);font-weight:700;margin-bottom:10px">RÉPONSES DU PROSPECT</div>

function exportCSV() {
  const dossiers=window._dossiers||[];
  if(!dossiers.length){alert("Aucune soumission.");return;}
  const Q1MAP={A:"Pas assez prospects",B:"Pas de conversion",C:"Pas de récurrence",D:"Cash insuffisant",E:"Tourne en rond"};
  const Q3MAP={A:"Critique",B:"Tendue",C:"Stable",D:"Confortable"};
  const Q4MAP={A:"< 10K DHS",B:"10–50K DHS",C:"50–150K DHS",D:"> 150K DHS"};
  const headers=["Prénom","Nom","Email","Entreprise","Q1 Blocage","Q3 Finances","Q4 CA","Stoppeur","Statut","Date","Problème décrit"];
  const rows=dossiers.map(d=>[
    d.prenom||"",d.nom||"",d.email||"",d.entreprise||"",
    Q1MAP[(d.data_json||{}).q1]||"",Q3MAP[(d.data_json||{}).q3]||"",
    Q4MAP[(d.data_json||{}).q4]||"",d.stoppeur||"",d.statut_suivi||"",
    d.created_at?new Date(d.created_at).toLocaleDateString("fr-FR"):"",
    ((d.data_json||{}).q5||"").replace(/"/g,"''")
  ]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`eclair_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
