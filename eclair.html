body{background:#080810;color:#F5F0E8;font-family:'DM Sans',sans-serif;min-height:100vh}
:root{--gold:#C9A84C;--dark:#080810;--dark2:#0F0F1A;--border:#2A2A3A;--text:#F5F0E8;--muted:#8A8A9A;--red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#2C5282}
input,textarea{background:var(--dark2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--gold)}
input.error{border-color:var(--red)!important}
button{cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:6px;transition:all .2s}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
h1,h2,h3{font-family:'DM Serif Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:#C9A84C44;border-radius:4px}
.gold-btn{background:var(--gold);color:var(--dark);padding:12px 24px;font-size:14px;font-weight:600;border-radius:6px;border:none;width:100%}
.gold-btn:hover{opacity:.9;transform:translateY(-1px)}
.gold-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 20px;font-size:13px;border-radius:6px}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold)}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:24px}
.field-wrap{margin-bottom:18px}
.field-error{color:var(--red);font-size:11px;margin-top:4px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{animation:fadeInUp .35s ease}
.saving-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite}
.hidden{display:none!important}
#topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
#progressbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:16px}
#content{max-width:620px;margin:0 auto;padding:32px 20px 100px}
.choice-card{background:var(--dark2);border:2px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left;width:100%}
.choice-card:hover{border-color:var(--gold);background:#C9A84C08}
.choice-card.selected{border-color:var(--gold);background:#C9A84C12}
.choice-card .choice-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.choice-card .choice-sub{font-size:12px;color:var(--muted);line-height:1.5}
.nav-btns{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);gap:12px}
.modal-overlay{position:fixed;inset:0;background:#000d;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px #000c;animation:fadeInUp .3s ease}
.stoppeur-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:24px;font-weight:700;font-size:15px}
.insight-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}

// ═══════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════
async function sbFetch(path, opts={}) {
  try {
    const res = await fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": opts.prefer || "",
        ...(opts.headers||{})
      }
    });
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  } catch(e) { console.error("Supabase:", e); return null; }
}

async function saveToSupabase() {
  if (!STATE.sessionId) return;
  const d = STATE.data;
  await sbFetch("/rest/v1/diagnostics", {
    method: "POST",
    headers: { "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify({
      id: STATE.sessionId,
      prenom: d.prenom || "",
      nom: d.nom || "",
      email: d.email || "",
      entreprise: d.entreprise || "",
      step_actuel: STATE.step,
      data_json: STATE.data,
      stoppeur: STATE.stoppeur || null,
      statut_suivi: "nouveau",
      source: "eclair",
      updated_at: new Date().toISOString()
    })
  });
}

function calculeStoppeur(q1, q2, q3, q4) {
  // Pondération Q1
  let forceSprint90 = (q1 === "C" || q1 === "D") && q2 === "D";
  let urgenceCritique = q1 === "A" && (q4 === "C" || q4 === "D");

  // Clé matrice Q2×Q3
  let key = q2 + "-" + q3;
  let stoppeur = STOPPEURS[key] || STOPPEURS[q2 + "-" + q2] || Object.values(STOPPEURS)[0];

  // Pondération
  if (forceSprint90) stoppeur = {...stoppeur, sprint: "Sprint 90™"};
  if (q1 === "D") stoppeur = {...stoppeur, sprint: "Sprint 90™"};

  // Urgence
  let urgence = "normale";
  if (q4 === "C") urgence = "haute";
  if (q4 === "D" || urgenceCritique) urgence = "critique";

  return { stoppeur, urgence };
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goTo(step) {
  STATE.step = step;
  STATE.fieldErrors = {};
  updateProgress();
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function goNext() {
  const idx = STEPS.indexOf(STATE.step);

  // Validation
  if (STATE.step === "identite") {
    const errs = {};
    if (!STATE.data.prenom?.trim()) errs.prenom = "Prénom requis";
    if (!STATE.data.nom?.trim()) errs.nom = "Nom requis";
    if (!STATE.data.email?.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(STATE.data.email)) errs.email = "Email valide requis";
    if (!STATE.data.entreprise?.trim()) errs.entreprise = "Entreprise requise";
    if (Object.keys(errs).length > 0) { STATE.fieldErrors = errs; render(); return; }

    // Créer session + sauvegarder
    if (!STATE.sessionId) {
      STATE.sessionId = "eclair_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
    }
    saveToSupabase();
  }

  // Validation questions
  if (["q1","q2","q3","q4","q5"].includes(STATE.step)) {
    const key = STATE.step;
    if (!STATE.data[key]) {
      STATE.fieldErrors[key] = "Veuillez sélectionner une réponse";
      render();
      return;
    }
  }

  // Avant calcul : calculer le stoppeur
  if (STATE.step === "q5") {
    const { stoppeur, urgence } = calculeStoppeur(
      STATE.data.q1, STATE.data.q2, STATE.data.q3, STATE.data.q4
    );
    STATE.stoppeur = stoppeur;
    STATE.urgence = urgence;
    saveToSupabase();
    goTo("calcul");
    setTimeout(() => goTo("resultat"), 2800);
    return;
  }

  const nextStep = STEPS[idx+1];
  goTo(nextStep);
}

function goBack() {
  const idx = STEPS.indexOf(STATE.step);
  if (idx > 1) goTo(STEPS[idx-1]);
}

function setChoice(key, value) {
  STATE.data[key] = value;
  STATE.fieldErrors = {};
  render();
}

// ═══════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════
function updateProgress() {
  const pb = document.getElementById('progressbar');
  const step = STATE.step;
  const questionSteps = ["identite","q1","q2","q3","q4","q5"];
  if (!questionSteps.includes(step)) { pb.classList.add('hidden'); return; }
  pb.classList.remove('hidden');
  const idx = questionSteps.indexOf(step);
  const pct = Math.round(((idx+1)/questionSteps.length)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-label').textContent = STEP_LABELS[step]||'';
}

// ═══════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════
function field(label, key, opts={}) {
  const val = STATE.data[key]||"";
  const err = STATE.fieldErrors[key]||"";
  const wrap = document.createElement('div');
  wrap.className='field-wrap';
  const lbl = document.createElement('label');
  lbl.innerHTML = label + ` <span style="color:var(--gold)">*</span>`;
  wrap.appendChild(lbl);
  const inp = document.createElement('input');
  inp.type = opts.type||"text";
  inp.value = val;
  inp.placeholder = opts.placeholder||"";
  if(err) inp.classList.add('error');
  inp.oninput = () => { STATE.data[key] = inp.value; STATE.fieldErrors[key]=""; };
  wrap.appendChild(inp);
  if(err){ const e=document.createElement('div');e.className='field-error';e.textContent="⚠ "+err;wrap.appendChild(e); }
  return wrap;
}

function choiceGroup(key, options) {
  const selected = STATE.data[key]||"";
  const err = STATE.fieldErrors[key]||"";
  const wrap = document.createElement('div');
  if(err){ const e=document.createElement('div');e.style.cssText="color:var(--red);font-size:12px;margin-bottom:12px;padding:8px 12px;background:#C0392B15;border-radius:6px";e.textContent="⚠ Veuillez sélectionner une réponse";wrap.appendChild(e); }
  options.forEach(({value, label, sub}) => {
    const btn = document.createElement('button');
    btn.className = 'choice-card' + (selected===value?' selected':'');
    btn.innerHTML = `<div class="choice-label">${label}</div>${sub?`<div class="choice-sub">${sub}</div>`:''}`;
    btn.onclick = () => setChoice(key, value);
    wrap.appendChild(btn);
  });
  return wrap;
}

function navBtns(showBack=true) {
  const div = document.createElement('div');
  div.className = 'nav-btns';
  if(showBack) {
    const back = document.createElement('button');
    back.className='ghost-btn';back.textContent='← Retour';
    back.onclick = goBack;
    div.appendChild(back);
  }
  const next = document.createElement('button');
  next.className='gold-btn';next.style.flex='1';
  next.textContent = 'Continuer →';
  next.onclick = goNext;
  div.appendChild(next);
  return div;
}

// MAIN RENDER
// ═══════════════════════════════════════════════════
function render() {
  const content = document.getElementById('content');
  let page;
  switch(STATE.step) {
    case "accueil":      page = renderAccueil(); break;
    case "identite":     page = renderIdentite(); break;
    case "q1":           page = renderQ1(); break;
    case "q2":           page = renderQ2(); break;
    case "q3":           page = renderQ3(); break;
    case "q4":           page = renderQ4(); break;
    case "q5":           page = renderQ5(); break;
    case "calcul":       page = renderCalcul(); break;
    case "resultat":     page = renderResultat(); break;
    case "cta":          page = renderCTA(); break;
    case "confirmation": page = renderConfirmation(); break;
    default:             page = document.createElement('div');
  }
  content.innerHTML = '';
  content.appendChild(page);
  updateProgress();
}

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
